<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NUTRAFIT - Mi Asistente</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#78a978">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NutraFit">

    <link rel="apple-touch-icon" href="IMAGENES/logo.png">
    <link rel="icon" type="image/png" href="IMAGENES/logo.png">

    <style>
        .toast-actualizacion {
            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%) translateY(20px);
            background: rgba(46, 74, 46, 0.95);
            color: #fff;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.2px;
            z-index: 9999;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease, transform 0.25s ease;
            max-width: calc(100% - 30px);
            text-align: center;
        }

        .toast-actualizacion.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast-actualizacion.info {
            background: rgba(46, 74, 46, 0.95);
        }

        .toast-actualizacion.ok {
            background: rgba(90, 138, 90, 0.96);
        }
    </style>
</head>
<body>

    <div id="pantalla-inicio" class="contenedor">
        <header class="cabecera-inicio">
            <img src="IMAGENES/IMAGEN_2.png" class="imagen-principal" alt="Nutrafit Logo">
        </header>
        
        <div class="menu">
            <button onclick="abrirVista('creditos-diarios')">
                <i class="fas fa-credit-card"></i> Mis Créditos Diarios
            </button>
            
            <button onclick="abrirVista('creditos-alimentos')">
                <i class="fas fa-apple-alt"></i> Mis Créditos de Alimentos
            </button>
            
            <button onclick="abrirVista('evolucion-peso')">
                <i class="fas fa-chart-line"></i> Mi Evolución de Peso
            </button>
            
            <button onclick="abrirVista('agua')">
                <i class="fas fa-glass-whiskey"></i> Mi Control de Agua
            </button>
            
            <button onclick="abrirVista('diario-formulario')">
                <i class="fas fa-book-open"></i> Mi Diario de Comida
            </button>
            
            <button onclick="abrirVista('carrito-compra')">
                <i class="fas fa-shopping-cart"></i> Mi Carrito de la Compra
            </button>
            
            <button onclick="abrirVista('recetas-favoritas')">
                <i class="fas fa-heart"></i> Mis Recetas Favoritas
            </button>
            
            <button onclick="abrirVista('ejercicio-diario')">
                <i class="fas fa-dumbbell"></i> Mi Ejercicio Diario
            </button>
        </div>
    </div>

    <div id="contenedor-vistas" style="display: none; min-height: 100vh; width: 100%;">
        </div>

    <div id="toast-actualizacion" class="toast-actualizacion info" aria-live="polite"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script src="js/app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const toast = document.getElementById('toast-actualizacion');
                let temporizadorToast = null;

                function mostrarToastActualizacion(mensaje, tipo = 'info', autocierreMs = 0) {
                    if (!toast) return;
                    toast.textContent = mensaje;
                    toast.classList.remove('info', 'ok');
                    toast.classList.add(tipo);
                    toast.classList.add('visible');

                    if (temporizadorToast) {
                        clearTimeout(temporizadorToast);
                        temporizadorToast = null;
                    }

                    if (autocierreMs > 0) {
                        temporizadorToast = setTimeout(() => {
                            toast.classList.remove('visible');
                        }, autocierreMs);
                    }
                }

                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        console.log('Service Worker activo');

                        if (reg.waiting) {
                            mostrarToastActualizacion('Nueva versión detectada. Actualizando...', 'info');
                            setTimeout(() => {
                                reg.waiting.postMessage({ type: 'SKIP_WAITING' });
                            }, 450);
                        }

                        reg.addEventListener('updatefound', () => {
                            const nuevoSW = reg.installing;
                            if (!nuevoSW) return;

                            nuevoSW.addEventListener('statechange', () => {
                                if (nuevoSW.state === 'installed' && navigator.serviceWorker.controller) {
                                    mostrarToastActualizacion('Hay una nueva versión. Aplicando cambios...', 'info');
                                    setTimeout(() => {
                                        nuevoSW.postMessage({ type: 'SKIP_WAITING' });
                                    }, 450);
                                }
                            });
                        });

                        reg.update();
                    })
                    .catch(err => console.log('Error al registrar SW:', err));

                let recargaHecha = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (recargaHecha) return;
                    recargaHecha = true;
                    mostrarToastActualizacion('Versión actualizada. Recargando...', 'ok');
                    window.location.reload();
                });
            });
        }
    </script>
</body>
</html>

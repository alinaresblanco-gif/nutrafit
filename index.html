<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NUTRAFIT - Mi Asistente</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="theme-color" content="#78a978">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NutraFit">

    <link rel="apple-touch-icon" href="IMAGENES/logo.png">
    <link rel="icon" type="image/png" href="IMAGENES/logo.png">
</head>
<body>

    <div id="pantalla-inicio" class="contenedor">
        <header class="cabecera-inicio">
            <img src="IMAGENES/IMAGEN_2.png" class="imagen-principal" alt="Nutrafit Logo">
        </header>
        
        <div class="menu">
            <button onclick="abrirVista('creditos-diarios')">
                <i class="fas fa-credit-card"></i> Mis Créditos Diarios
            </button>
            
            <button onclick="abrirVista('creditos-alimentos')">
                <i class="fas fa-apple-alt"></i> Mis Créditos de Alimentos
            </button>
            
            <button onclick="abrirVista('evolucion-peso')">
                <i class="fas fa-chart-line"></i> Mi Evolución de Peso
            </button>
            
            <button onclick="abrirVista('agua')">
                <i class="fas fa-glass-whiskey"></i> Mi Control de Agua
            </button>
            
            <button onclick="abrirVista('diario-comida')">
                <i class="fas fa-book-open"></i> Mi Diario de Comida
            </button>
            
            <button onclick="abrirVista('carrito-compra')">
                <i class="fas fa-shopping-cart"></i> Mi Carrito de la Compra
            </button>
            
            <button onclick="abrirVista('recetas-favoritas')">
                <i class="fas fa-heart"></i> Mis Recetas Favoritas
            </button>
            
            <button onclick="abrirVista('ejercicio-diario')">
                <i class="fas fa-dumbbell"></i> Mi Ejercicio Diario
            </button>
        </div>
    </div>

    <div id="contenedor-vistas" style="display: none; min-height: 100vh; width: 100%;">
        </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script src="js/app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker activo'))
                    .catch(err => console.log('Error al registrar SW:', err));
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutraFit - Mis Menús Semanales</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root { 
            --verde-corp: #78a978; 
            --verde-oscuro: #5a8a5a; 
            --gris-fondo: #f4f4f4; 
            --rojo-calendario: #d9534f; 
            --amarillo-estrella: #ffcc00;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--gris-fondo); color: #333; }

        /* CABECERA */
        .cabecera-barra { 
            background: var(--verde-corp); padding: 10px 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            color: white; position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .boton-nav-circular { 
            background: rgba(255,255,255,0.2); border:none; color:white; 
            width:38px; height:38px; border-radius:50%; display:flex; 
            align-items:center; justify-content:center; cursor: pointer;
        }

        .contenedor-principal { padding: 15px; }

        /* WIDGET SUPERIOR: RESUMEN DE HOY / PRÓXIMO */
        .resumen-superior {
            background: white; border-radius: 15px; padding: 15px;
            margin-bottom: 20px; display: flex; align-items: center;
            border-left: 6px solid var(--verde-corp);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* GRID DE TARJETAS */
        .grid-menus { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* TARJETA ALMANAQUE MEJORADA */
        .tarjeta-menu { 
            background: white; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.08); transition: 0.3s;
            display: flex; flex-direction: column; position: relative;
            border: 1px solid #eee;
        }
        
        .almanaque {
            width: 100%; background: #fff; text-align: center;
            padding-bottom: 15px;
        }
        .almanaque-tapa {
            background: var(--rojo-calendario); color: white;
            font-size: 0.75rem; font-weight: bold; padding: 8px 0;
            text-transform: uppercase; letter-spacing: 2px;
            border-bottom: 2px dashed rgba(255,255,255,0.3);
        }
        .almanaque-dia {
            font-size: 2.8rem; font-weight: 800; color: #333;
            line-height: 1; padding: 15px 0 5px;
        }
        .almanaque-mes { 
            font-size: 0.9rem; color: #666; font-weight: bold; 
            text-transform: uppercase;
        }

        /* SECCIÓN DE CRÉDITOS EN TARJETA */
        .stats-menu {
            background: #f9fdf9; padding: 10px;
            border-top: 1px solid #f0f0f0;
            display: flex; align-items: center; justify-content: center;
            gap: 8px;
        }
        .estrella-viva {
            color: var(--amarillo-estrella);
            font-size: 1.1rem;
            filter: drop-shadow(0 0 2px rgba(255, 204, 0, 0.5));
            animation: brillo 2s infinite alternate;
        }
        .puntos-texto {
            font-weight: bold; color: var(--verde-oscuro); font-size: 1rem;
        }

        @keyframes brillo {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.2); opacity: 1; }
        }

        .btn-ver-menu { 
            background: var(--verde-corp); color: white; border: none; 
            padding: 10px; font-weight: bold; width: 100%; cursor: pointer;
            font-size: 0.85rem; text-transform: uppercase;
        }

        /* BOTÓN FLOTANTE */
        .btn-flotante { 
            position: fixed; bottom: 30px; right: 25px; 
            background: var(--verde-corp); color: white; 
            width: 65px; height: 65px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 28px; border: none; z-index: 999; cursor: pointer;
            box-shadow: 0 8px 20px rgba(120, 169, 120, 0.4);
        }

        #seccion-nuevo-menu { display: none; }

    </style>
</head>
<body>

    <div class="cabecera-barra">
        <button onclick="volverInicio()" class="boton-nav-circular">
            <i class="fas fa-chevron-left"></i>
        </button>
        <strong>MIS MENÚS SEMANALES</strong>
        <div style="width:38px;"></div>
    </div>

    <div id="vista-lista-menus" class="contenedor-principal">
        
        <div class="resumen-superior">
            <i class="fas fa-info-circle" style="color: var(--verde-corp); margin-right: 15px; font-size: 1.2rem;"></i>
            <p style="margin:0; font-size: 0.9rem; color: #555;">
                Selecciona una semana para ver tu planificación o pulsa <b>+</b> para crear una nueva.
            </p>
        </div>

        <div id="contenedor-menus" class="grid-menus">
            <div class="tarjeta-menu">
                <div class="almanaque">
                    <div class="almanaque-tapa">Inicia Lunes</div>
                    <div class="almanaque-dia">06</div>
                    <div class="almanaque-mes">Abril</div>
                </div>
                <div class="stats-menu">
                    <i class="fas fa-star estrella-viva"></i>
                    <span class="puntos-texto">42.5 pts</span>
                </div>
                <button class="btn-ver-menu" onclick="verMenuDetalle('id_ejemplo')">Ver Plan</button>
            </div>

            <div class="tarjeta-menu">
                <div class="almanaque">
                    <div class="almanaque-tapa">Inicia Lunes</div>
                    <div class="almanaque-dia">30</div>
                    <div class="almanaque-mes">Marzo</div>
                </div>
                <div class="stats-menu">
                    <i class="fas fa-star estrella-viva"></i>
                    <span class="puntos-texto">38.0 pts</span>
                </div>
                <button class="btn-ver-menu">Ver Plan</button>
            </div>
        </div>

        <button class="btn-flotante" onclick="abrirFormularioNuevoMenu()">
            <i class="fas fa-plus"></i>
        </button>
    </div>

    <div id="seccion-nuevo-menu" class="contenedor-principal">
        </div>

    <script src="../js/config.js"></script>
    <script src="../js/app.js"></script>
    <script>
        function volverInicio() {
            window.location.href = '../index.html';
        }

        function abrirFormularioNuevoMenu() {
            // Aquí ocultaremos la lista y mostraremos el formulario acordeón
            document.getElementById('vista-lista-menus').style.display = 'none';
            document.getElementById('seccion-nuevo-menu').style.display = 'block';
            // Llamaríamos a: inicializarAcordeonMenu();
        }
    </script>
</body>
</html>

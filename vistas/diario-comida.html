<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Menú Semanal</title>

<style>

/* ======== CABECERA ======== */
.header {
  background-color: #2e7d32;
  color: white;
  padding: 15px;
  display: flex;
  align-items: center;
  gap: 15px;
  font-size: 20px;
  font-weight: bold;
}

.header img {
  width: 28px;
  height: 28px;
  cursor: pointer;
}

/* ======== CONTENEDOR GENERAL ======== */
.menu-semanal {
  width: 95%;
  margin: 15px auto;
  font-family: Arial, sans-serif;
}

/* ======== FICHAS DE DÍAS ======== */
.dia {
  margin-bottom: 12px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid #2e7d32;
}

.dia-header {
  width: 100%;
  background-color: #2e7d32;
  color: white;
  padding: 12px;
  font-size: 18px;
  text-align: left;
  border: none;
  cursor: pointer;
}

.dia-content {
  background: #f5f5f5;
  padding: 12px;
  display: none;
}

/* ======== CRÉDITOS ======== */
.creditos {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 15px;
  flex-wrap: wrap;
}

.creditos label {
  font-weight: bold;
  color: #2e7d32;
}

.input-creditos,
.input-restantes {
  width: 45px;
  padding: 6px;
  font-size: 16px;
  text-align: center;
  border: 1px solid #2e7d32;
  border-radius: 6px;
}

/* ======== MOMENTOS DEL DÍA ======== */
.momentos {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.momento h3 {
  margin: 0;
  color: #2e7d32;
  font-size: 17px;
}

.momento textarea {
  width: 100%;
  height: 60px;
  padding: 8px;
  border: 1px solid #2e7d32;
  border-radius: 6px;
  resize: vertical;
}

</style>
</head>

<body>

<!-- ======== CABECERA ======== -->
<div class="header">
  <img src="../iconos/back.png" onclick="history.back()">
  <span>MI MENÚ SEMANAL</span>
</div>

<!-- ======== CONTENEDOR PRINCIPAL ======== -->
<div class="menu-semanal">

  <!-- ======== DÍAS DE LA SEMANA ======== -->
  <!-- Repetimos este bloque para cada día -->

  <!-- LUNES -->
  <div class="dia">
    <button class="dia-header">LUNES</button>
    <div class="dia-content">

      <div class="creditos">
        <label>Créditos disponibles:</label>
        <input type="number" class="input-creditos">

        <label>Restantes:</label>
        <input type="number" class="input-restantes" disabled>
      </div>

      <div class="momentos">

        <div class="momento">
          <h3>Desayuno</h3>
          <textarea placeholder="Añadir ingredientes..."></textarea>
        </div>

        <div class="momento">
          <h3>Almuerzo</h3>
          <textarea placeholder="Añadir ingredientes..."></textarea>
        </div>

        <div class="momento">
          <h3>Comida</h3>
          <textarea placeholder="Añadir ingredientes..."></textarea>
        </div>

        <div class="momento">
          <h3>Merienda</h3>
          <textarea placeholder="Añadir ingredientes..."></textarea>
        </div>

        <div class="momento">
          <h3>Cena</h3>
          <textarea placeholder="Añadir ingredientes..."></textarea>
        </div>

      </div>
    </div>
  </div>

  <!-- COPIA ESTE BLOQUE Y CAMBIA EL NOMBRE DEL DÍA PARA: 
       MARTES, MIÉRCOLES, JUEVES, VIERNES, SÁBADO, DOMINGO -->

</div>

<script>
/* ======== ABRIR/CERRAR FICHAS ======== */
document.querySelectorAll(".dia-header").forEach(btn => {
  btn.addEventListener("click", () => {
    const content = btn.nextElementSibling;
    content.style.display = content.style.display === "block" ? "none" : "block";
  });
});
</script>

</body>
</html>

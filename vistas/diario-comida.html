<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutraFit - Mis Menús Semanales</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root { 
            --verde-corp: #78a978; 
            --verde-oscuro: #5a8a5a; 
            --gris-fondo: #f4f4f4; 
            --rojo-calendario: #d9534f; 
            --amarillo-estrella: #ffcc00;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--gris-fondo); color: #333; }

        .cabecera-barra { 
            background: var(--verde-corp); padding: 10px 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            color: white; position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .boton-nav-circular { 
            background: rgba(255,255,255,0.2); border:none; color:white; 
            width:38px; height:38px; border-radius:50%; display:flex; 
            align-items:center; justify-content:center; cursor: pointer;
        }

        .contenedor-principal { padding: 15px; }

        .contenedor-buscador-fecha {
            background: white; border-radius: 15px; padding: 10px 15px;
            margin-bottom: 10px; display: flex; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }
        .contenedor-buscador-fecha i { color: var(--verde-corp); margin-right: 10px; }
        .input-fecha-busqueda {
            border: none; outline: none; font-family: inherit; font-size: 1rem;
            color: #555; width: 100%; cursor: pointer; background: transparent;
        }

        .resumen-superior {
            background: #fdfdfd; border-radius: 12px; padding: 12px;
            margin-bottom: 20px; display: flex; align-items: center;
            border-left: 5px solid var(--verde-corp);
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .grid-menus { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .tarjeta-menu { 
            background: white; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.08); transition: 0.3s;
            display: flex; flex-direction: column; position: relative;
            border: 1px solid #eee;
        }
        
        .almanaque { width: 100%; background: #fff; text-align: center; padding-bottom: 15px; }
        .almanaque-tapa {
            background: var(--rojo-calendario); color: white;
            font-size: 0.75rem; font-weight: bold; padding: 8px 0;
            text-transform: uppercase; letter-spacing: 2px;
            border-bottom: 2px dashed rgba(255,255,255,0.3);
        }
        .almanaque-dia { font-size: 2.8rem; font-weight: 800; color: #333; line-height: 1; padding: 15px 0 5px; }
        .almanaque-mes { font-size: 0.9rem; color: #666; font-weight: bold; text-transform: uppercase; }

        .stats-menu {
            background: #f9fdf9; padding: 10px; border-top: 1px solid #f0f0f0;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .estrella-viva {
            color: var(--amarillo-estrella); font-size: 1rem;
            animation: brillo 2s infinite alternate;
        }
        .creditos-texto { font-weight: bold; color: var(--verde-oscuro); font-size: 0.95rem; }

        @keyframes brillo { 
            from { opacity: 0.7; transform: scale(1); } 
            to { opacity: 1; transform: scale(1.15); } 
        }

        .btn-ver-menu { 
            background: var(--verde-corp); color: white; border: none; 
            padding: 12px; font-weight: bold; width: 100%; cursor: pointer;
            font-size: 0.85rem; text-transform: uppercase; transition: 0.2s;
        }

        .btn-flotante { 
            position: fixed; bottom: 30px; right: 25px; 
            background: var(--verde-corp); color: white; 
            width: 65px; height: 65px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 28px; border: none; z-index: 999; cursor: pointer;
            box-shadow: 0 8px 20px rgba(120, 169, 120, 0.4);
        }
    </style>
</head>
<body>

    <div id="vista-lista-menus" class="contenedor-principal">
        <div class="cabecera-barra" style="margin: -15px -15px 15px -15px;">
            <button onclick="volverInicio()" class="boton-nav-circular">
                <i class="fas fa-chevron-left"></i>
            </button>
            <strong>MIS MENÚS SEMANALES</strong>
            <div style="width:38px;"></div>
        </div>
        
        <div class="contenedor-buscador-fecha">
            <i class="fas fa-search-location"></i>
            <input type="date" id="busqueda-fecha-menu" class="input-fecha-busqueda" onchange="filtrarPorFecha()">
        </div>

        <div class="resumen-superior">
            <i class="fas fa-info-circle" style="color: var(--verde-corp); margin-right: 15px; font-size: 1.1rem;"></i>
            <p style="margin:0; font-size: 0.85rem; color: #666;">
                Selecciona una semana o pulsa <b>+</b> para crear una nueva planificación.
            </p>
        </div>

        <div id="contenedor-menus" class="grid-menus"></div>

        <button class="btn-flotante" onclick="abrirFormularioNuevoMenu()">
            <i class="fas fa-plus"></i>
        </button>
    </div>

    <div id="seccion-nuevo-menu" class="contenedor-principal" style="display:none; background:white; min-height:100vh;">
        <div style="display:flex; align-items:center; margin-bottom:20px;">
            <button onclick="cerrarFormulario()" class="boton-nav-circular" style="background:var(--verde-corp); margin-right:15px;">
                <i class="fas fa-times"></i>
            </button>
            <h2 style="margin:0; color:var(--verde-oscuro); font-size:1.2rem;">Nueva Planificación</h2>
        </div>

        <div class="tarjeta-menu" style="width:100%; margin-bottom:20px;">
            <div class="almanaque">
                <div class="almanaque-tapa">Seleccionar Inicio</div>
                <input type="date" id="input-nueva-fecha" class="input-fecha-busqueda" 
                       style="text-align:center; font-size:1.5rem; font-weight:bold; padding:20px 0; width:100%;"
                       onchange="actualizarPrevisualizacionFecha(this.value)">
                <div id="previsualizacion-mes" class="almanaque-mes">...</div>
            </div>
            <div class="stats-menu">
                <i class="fas fa-star estrella-viva"></i>
                <span id="puntos-captados" class="creditos-texto">Cargando créditos...</span>
            </div>
            <button class="btn-ver-menu" onclick="confirmarYCrearMenu()">GUARDAR E INICIAR MENÚ</button>
        </div>
        <p style="font-size:0.8rem; color:#888; text-align:center;">* Los créditos se obtienen automáticamente del último registro de tu historial de créditos.</p>
    </div>

    <div id="seccion-acordeon-menu" class="contenedor-principal" style="display:none; background:var(--gris-fondo); min-height:100vh;">
        <div class="cabecera-barra" style="position:relative; margin:-15px -15px 20px -15px;">
            <button onclick="cerrarAcordeon()" class="boton-nav-circular"><i class="fas fa-chevron-left"></i></button>
            <strong id="titulo-menu-semana">MENÚ SEMANAL</strong>
            <button onclick="imprimirPDF()" class="boton-nav-circular"><i class="fas fa-file-pdf"></i></button>
        </div>
        <div id="contenedor-acordeon"></div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/app.js"></script>
    <script>
        function volverInicio() { window.location.href = '../index.html'; }
        
        function cerrarFormulario() {
            document.getElementById('seccion-nuevo-menu').style.display = 'none';
            document.getElementById('vista-lista-menus').style.display = 'block';
            // Limpiar inputs al cerrar
            document.getElementById('input-nueva-fecha').value = '';
            document.getElementById('previsualizacion-mes').innerText = '...';
        }

        function cerrarAcordeon() {
            document.getElementById('seccion-acordeon-menu').style.display = 'none';
            document.getElementById('vista-lista-menus').style.display = 'block';
        }

        function actualizarPrevisualizacionFecha(fecha) {
            if(!fecha) return;
            const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            const d = new Date(fecha);
            document.getElementById('previsualizacion-mes').innerText = meses[d.getMonth()];
        }

        document.addEventListener('DOMContentLoaded', () => {
            if(typeof cargarTarjetasMenus === "function") {
                cargarTarjetasMenus();
            }
        });
    </script>
</body>
</html>

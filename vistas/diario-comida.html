<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NutraFit - Diario de Comida</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --verde-corp: #78a978;
            --verde-oscuro: #5a8a5a;
            --blanco: #ffffff;
            --gris-fondo: #f4f7f4;
            --rojo-alerta: #e74c3c;
            --sombra: 0 4px 10px rgba(0,0,0,0.08);
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background-color: var(--gris-fondo); padding-bottom: 100px;
        }

        /* --- CABECERA --- */
        .cabecera {
            background-color: var(--verde-corp);
            padding: 15px; display: flex; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        .btn-retroceso {
            background: transparent; border: none; color: white;
            font-size: 1.4rem; padding-right: 15px; text-decoration: none;
        }

        .titulo-cabecera {
            color: white; font-weight: bold; flex-grow: 1; text-align: center;
            margin-right: 35px; letter-spacing: 1px;
        }

        /* --- CONTENEDOR ACORDEÓN --- */
        .contenedor-diario { padding: 15px; }

        .dia-ficha {
            background: white; border-radius: 12px; margin-bottom: 12px;
            overflow: hidden; box-shadow: var(--sombra); border: 1px solid #e0e0e0;
        }

        .dia-header {
            padding: 18px 15px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer; position: relative;
        }

        .dia-titulo { font-weight: 800; color: var(--verde-oscuro); font-size: 1rem; pointer-events: none; }

        .creditos-info { display: flex; gap: 10px; align-items: center; }

        .caja-creditos { display: flex; flex-direction: column; align-items: center; }
        .label-mini { font-size: 0.6rem; color: #999; font-weight: bold; margin-bottom: 2px; }

        .input-puntos {
            width: 42px; height: 30px; border: 2px solid var(--verde-corp);
            border-radius: 6px; text-align: center; font-weight: bold; outline: none;
            background: #fff; color: #333; position: relative; z-index: 10;
        }

        .restante-badge {
            min-width: 42px; height: 30px; background: #f0f0f0;
            border-radius: 6px; display: flex; align-items: center;
            justify-content: center; font-weight: bold; font-size: 0.95rem;
        }

        /* --- CONTENIDO --- */
        .dia-contenido { display: none; padding: 0 15px 15px 15px; border-top: 1px solid #f9f9f9; }
        .dia-ficha.activo .dia-contenido { display: block; }

        .momento-bloque {
            background: #fdfdfd; margin-top: 10px;
            padding: 12px; border-radius: 8px; border: 1px solid #f0f0f0;
        }

        .momento-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .momento-nombre { font-weight: bold; color: var(--verde-corp); font-size: 0.85rem; text-transform: uppercase; }

        .lista-ingredientes {
            min-height: 20px; font-size: 0.85rem; color: #888;
            margin-top: 5px; border-top: 1px dashed #eee; padding-top: 5px;
        }

        .btn-anadir {
            background: var(--verde-corp); color: white; border: none;
            width: 32px; height: 32px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-size: 1rem;
            cursor: pointer;
        }

        /* --- BOTÓN GUARDAR --- */
        .btn-flotante-guardar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--verde-corp); color: white; padding: 15px 40px;
            border-radius: 30px; font-weight: bold; text-decoration: none;
            box-shadow: 0 5px 15px rgba(120, 169, 120, 0.4); z-index: 1001;
            display: flex; align-items: center; gap: 10px;
        }
    </style>
</head>
<body>

    <header class="cabecera">
        <a href="../index.html" class="btn-retroceso"><i class="fas fa-arrow-left"></i></a>
        <div class="titulo-cabecera">MI MENÚ SEMANAL</div>
    </header>

    <div class="contenedor-diario">
        <script>
            const diasNom = ["LUNES", "MARTES", "MIÉRCOLES", "JUEVES", "VIERNES", "SÁBADO", "DOMINGO"];
            const momentos = ["Desayuno", "Almuerzo", "Comida", "Merienda", "Cena"];

            diasNom.forEach((dia, i) => {
                document.write(`
                <div class="dia-ficha" id="ficha-${i}">
                    <div class="dia-header" onclick="toggleDia(${i})">
                        <div class="dia-titulo">${dia}</div>
                        <div class="creditos-info">
                            <div class="caja-creditos">
                                <span class="label-mini">BASE</span>
                                <input type="number" class="input-puntos" id="base-${i}" 
                                       onclick="event.stopPropagation()" oninput="calcular(${i})" placeholder="00">
                            </div>
                            <div class="caja-creditos">
                                <span class="label-mini">RESTAN</span>
                                <div class="restante-badge" id="restante-${i}">0</div>
                            </div>
                            <i class="fas fa-chevron-down" style="color:#ccc; margin-left:5px"></i>
                        </div>
                    </div>
                    <div class="dia-contenido">
                        ${momentos.map(m => `
                            <div class="momento-bloque">
                                <div class="momento-header">
                                    <span class="momento-nombre">${m}</span>
                                    <button class="btn-anadir" onclick="event.stopPropagation(); abrirDespensa(${i},'${m}')">+</button>
                                </div>
                                <div class="lista-ingredientes" id="lista-${i}-${m}">Sin ingredientes</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
                `);
            });
        </script>
    </div>

    <a href="#" class="btn-flotante-guardar" onclick="alert('Guardando...')">
        <i class="fas fa-save"></i> GUARDAR SEMANA
    </a>

    <script>
        function toggleDia(idx) {
            const ficha = document.getElementById('ficha-' + idx);
            const estaActivo = ficha.classList.contains('activo');
            
            // Cerramos todos
            document.querySelectorAll('.dia-ficha').forEach(f => f.classList.remove('activo'));
            
            // Si no estaba activo, lo abrimos
            if (!estaActivo) {
                ficha.classList.add('activo');
            }
        }

        function calcular(idx) {
            const val = document.getElementById('base-' + idx).value;
            document.getElementById('restante-' + idx).innerText = val || 0;
        }

        function abrirDespensa(diaIdx, momento) {
            alert("Añadir a: " + momento);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutraFit - Menús</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root { --verde: #78a978; --verde-osc: #5a8a5a; --fondo: #f8f9fa; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--fondo); }
        
        /* CABECERA Y BUSCADOR PRINCIPAL */
        .cabecera-fija { background: var(--verde); padding: 15px; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 1000; }
        .btn-nav { background: rgba(255,255,255,0.2); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        /* DESPENSA MINI (SISTEMA NUEVO) */
        #despensa-mini-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 80vh; background: white; z-index: 5000; box-shadow: 0 5px 20px rgba(0,0,0,0.3); border-radius: 0 0 20px 20px; overflow: hidden; }
        .lista-mini-scroll { height: calc(80vh - 110px); overflow-y: auto; padding: 10px; }
        .cabecera-grupo { background: #edf5ed; color: #446644; padding: 8px; font-weight: bold; font-size: 0.8rem; margin-top: 10px; border-radius: 5px; }
        .fila-alimento { border-bottom: 1px solid #eee; cursor: pointer; }
        .fila-alimento:active { background: #f0f7f0; }
        .credito-badge { background: var(--verde); color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.8rem; }

        /* FICHAS DEL ACORDEÓN */
        .dia-ficha { margin: 10px; border-radius: 12px; border: 1px solid #ddd; background: white; overflow: hidden; }
        .dia-header { background: var(--verde); color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .dia-cuerpo { padding: 15px; display: none; }
        .dia-ficha.activo .dia-cuerpo { display: block; }
        
        /* INPUTS */
        .input-puntos-dia, .input-restantes-dia { width: 45px; border: none; text-align: center; font-weight: bold; border-radius: 5px; }
        .input-puntos-dia { color: var(--verde-osc); }
        .momento-titulo { color: var(--verde); font-weight: bold; font-size: 0.8rem; text-transform: uppercase; border-left: 3px solid var(--verde); padding-left: 8px; margin: 15px 0 8px; }
        .fila-ingrediente { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid #f5f5f5; }
        .input-ingrediente { flex-grow: 1; border: none; outline: none; font-size: 0.9rem; color: #333; }
        .input-puntos-ing { width: 35px; border: none; background: #f0f0f0; text-align: center; font-weight: bold; border-radius: 4px; }

        /* MODAL */
        .modal-nuevo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 2000; }
        .modal-contenido { position: absolute; bottom: 0; width: 100%; height: 92vh; background: white; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <div id="despensa-mini-container">
        <div style="background: var(--verde); padding: 15px; display: flex; justify-content: space-between; align-items: center; color: white;">
            <span><i class="fas fa-search"></i> DESPENSA</span>
            <button onclick="cerrarDespensaMini()" class="btn-nav"><i class="fas fa-times"></i></button>
        </div>
        <div style="padding: 10px; background: var(--verde);">
            <input type="text" id="bus-mini" style="width: 100%; padding: 10px; border-radius: 20px; border: none;" placeholder="Buscar alimento..." onkeyup="filtrarMini()">
        </div>
        <div id="lista-mini-contenido" class="lista-mini-scroll"></div>
    </div>

    <header class="cabecera-fija">
        <button onclick="location.reload()" class="btn-nav"><i class="fas fa-sync"></i></button>
        <span style="font-weight: bold;">MIS MENÚS</span>
        <button onclick="abrirNuevoMenu()" class="btn-nav" style="background: white; color: var(--verde);"><i class="fas fa-plus"></i></button>
    </header>

    <div id="modal-nuevo" class="modal-nuevo">
        <div class="modal-contenido">
            <div style="background: var(--verde); padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center;">
                <button class="btn-nav" onclick="cerrarNuevoMenu()"><i class="fas fa-chevron-down"></i></button>
                <strong>PLANIFICACIÓN</strong>
                <button class="btn-nav" onclick="alert('Guardado')"><i class="fas fa-save"></i></button>
            </div>
            
            <div style="flex-grow: 1; overflow-y: auto; padding-bottom: 40px;">
                <div id="contenedor-fichas-manual">
                    </div>
            </div>
        </div>
    </div>
    <script>
    // --- VARIABLES GLOBALES ---
    let inventarioCompleto = [];
    let inputDestinoNombre = null;
    let inputDestinoPuntos = null;

    // --- 1. GENERACIÓN SEGURA DE LAS FICHAS (LUNES A DOMINGO) ---
    function renderizarFichasSemanales() {
        const contenedor = document.getElementById('contenedor-fichas-manual');
        const dias = ["LUNES", "MARTES", "MIERCOLES", "JUEVES", "VIERNES", "SABADO", "DOMINGO"];
        const momentos = ["Desayuno", "Almuerzo", "Comida", "Merienda", "Cena"];
        
        let htmlSemanas = "";

        dias.forEach((dia, index) => {
            const esActivo = index === 0 ? "activo" : ""; // Solo el lunes abierto por defecto
            htmlSemanas += `
            <div class="dia-ficha ${esActivo}" id="ficha-${dia.toLowerCase()}">
                <div class="dia-header" onclick="toggleDia('ficha-${dia.toLowerCase()}')">
                    <strong>${dia}</strong>
                    <div style="display: flex; gap: 8px;">
                        <div style="text-align:center"><span style="font-size:10px;display:block">TOTAL</span>
                            <input type="number" class="input-puntos-dia" value="0" onclick="event.stopPropagation()" oninput="actualizarPuntosDia(this)">
                        </div>
                        <div style="text-align:center"><span style="font-size:10px;display:block">RESTA</span>
                            <input type="number" class="input-restantes-dia" value="0" readonly>
                        </div>
                    </div>
                </div>
                <div class="dia-cuerpo">
                    ${momentos.map(m => `
                        <div class="momento-seccion">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom:5px;">
                                <span class="momento-titulo">${m}</span>
                                <button class="btn-nav" style="background:var(--verde); width:28px; height:28px;" onclick="abrirDespensaMini(this)">
                                    <i class="fas fa-plus" style="font-size: 12px;"></i>
                                </button>
                            </div>
                            <div class="lista-ingredientes">
                                <div class="fila-ingrediente">
                                    <input type="text" class="input-ingrediente" placeholder="Añadir..." oninput="verificarFilaNueva(this)">
                                    <input type="number" class="input-puntos-ing" value="0" oninput="actualizarPuntosDia(this)">
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>`;
        });
        contenedor.innerHTML = htmlSemanas;
    }

    // --- 2. FUNCIONES DE NAVEGACIÓN ---
    function abrirNuevoMenu() { 
        document.getElementById('modal-nuevo').style.display = 'block'; 
        renderizarFichasSemanales(); // Dibujamos las fichas al abrir
    }
    function cerrarNuevoMenu() { document.getElementById('modal-nuevo').style.display = 'none'; }
    
    function toggleDia(id) {
        document.querySelectorAll('.dia-ficha').forEach(f => f.classList.remove('activo'));
        document.getElementById(id).classList.add('activo');
    }

    // --- 3. LÓGICA DE LA DESPENSA MINI ---
    function abrirDespensaMini(btn) {
        const seccion = btn.closest('.momento-seccion');
        const filas = seccion.querySelectorAll('.fila-ingrediente');
        // Buscamos la última fila o una vacía
        let filaDestino = Array.from(filas).find(f => f.querySelector('.input-ingrediente').value.trim() === "") || filas[filas.length - 1];
        
        inputDestinoNombre = filaDestino.querySelector('.input-ingrediente');
        inputDestinoPuntos = filaDestino.querySelector('.input-puntos-ing');

        document.getElementById('despensa-mini-container').style.display = 'block';
        
        if (inventarioCompleto.length === 0) {
            cargarDatosExcel();
        } else {
            renderizarListaMini(inventarioCompleto);
        }
    }

    function cargarDatosExcel() {
        const listaContenedor = document.getElementById('lista-mini-contenido');
        listaContenedor.innerHTML = '<p style="text-align:center; padding:20px;">Cargando despensa real...</p>';
        
        google.script.run
            .withSuccessHandler(datos => {
                inventarioCompleto = datos; 
                renderizarListaMini(datos);
            })
            .obtenerAlimentosDespensa(); 
    }

    function renderizarListaMini(lista) {
        const contenedor = document.getElementById('lista-mini-contenido');
        contenedor.innerHTML = '';
        
        // Agrupar por categoría
        const grupos = {};
        lista.forEach(item => {
            const cat = item.Categoria || "Otros";
            if(!grupos[cat]) grupos[cat] = [];
            grupos[cat].push(item);
        });

        for (let cat in grupos) {
            let htmlCat = `<div class="cabecera-grupo">${cat}</div><table style="width:100%">`;
            grupos[cat].forEach(item => {
                const nombreEsc = item.Nombre.replace(/'/g, "\\'");
                htmlCat += `
                    <tr class="fila-alimento" onclick="seleccionarMini('${nombreEsc}', ${item.Netos})">
                        <td style="padding:10px; font-size:14px;">${item.Nombre}</td>
                        <td style="text-align:right; padding:10px;"><span class="credito-badge">${item.Netos} pts</span></td>
                    </tr>`;
            });
            contenedor.innerHTML += htmlCat + "</table>";
        }
    }

    function seleccionarMini(nombre, puntos) {
        if (inputDestinoNombre) {
            inputDestinoNombre.value = nombre;
            inputDestinoPuntos.value = puntos;
            verificarFilaNueva(inputDestinoNombre);
            actualizarPuntosDia(inputDestinoPuntos);
        }
        cerrarDespensaMini();
    }

    function cerrarDespensaMini() { document.getElementById('despensa-mini-container').style.display = 'none'; }

    function filtrarMini() {
        const val = document.getElementById('bus-mini').value.toLowerCase();
        document.querySelectorAll('.fila-alimento').forEach(f => {
            f.style.display = f.innerText.toLowerCase().includes(val) ? "" : "none";
        });
    }

    // --- 4. CÁLCULOS ---
    function verificarFilaNueva(input) {
        const lista = input.closest('.lista-ingredientes');
        const filas = lista.querySelectorAll('.fila-ingrediente');
        if (input.parentElement === filas[filas.length - 1] && input.value.trim() !== "") {
            const nueva = document.createElement('div');
            nueva.className = 'fila-ingrediente';
            nueva.innerHTML = `
                <input type="text" class="input-ingrediente" placeholder="Añadir..." oninput="verificarFilaNueva(this)">
                <input type="number" class="input-puntos-ing" value="0" oninput="actualizarPuntosDia(this)">`;
            lista.appendChild(nueva);
        }
    }

    function actualizarPuntosDia(el) {
        const ficha = el.closest('.dia-ficha');
        const total = parseFloat(ficha.querySelector('.input-puntos-dia').value) || 0;
        const sumandos = ficha.querySelectorAll('.input-puntos-ing');
        let consumido = 0;
        sumandos.forEach(s => consumido += parseFloat(s.value) || 0);
        
        const restante = total - consumido;
        const resDisplay = ficha.querySelector('.input-restantes-dia');
        resDisplay.value = restante;
        resDisplay.style.backgroundColor = restante < 0 ? "#e74c3c" : "white";
        resDisplay.style.color = restante < 0 ? "white" : "#d35400";
    }

</script>
</body>
</html>

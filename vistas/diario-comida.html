<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Menú Semanal</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f0f0f0;
}

.header {
  position: fixed;
  top: 0;
  width: 100%;
  background: #2e7d32;
  color: white;
  display: flex;
  align-items: center;
  padding: 10px;
}

.header h1 {
  flex: 1;
  text-align: center;
  margin: 0;
}

.btn-back {
  background: none;
  border: none;
  color: white;
  font-size: 20px;
}

.contenedor {
  margin-top: 70px;
  padding: 10px;
}

.dia-card {
  background: white;
  border-radius: 10px;
  margin-bottom: 15px;
  padding: 10px;
}

.dia-header {
  background: #2e7d32;
  color: white;
  padding: 8px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
}

.comida {
  margin-top: 10px;
}

.comida h4 {
  margin: 5px 0;
  color: #2e7d32;
}

.comida input {
  width: 65%;
}
</style>
</head>

<body>

<header class="header">
  <button onclick="volver()" class="btn-back">←</button>
  <h1>MI MENÚ SEMANAL</h1>
</header>

<div class="contenedor" id="contenedor"></div>

<script>
const dias = ["lunes","martes","miercoles","jueves","viernes","sabado","domingo"];
const comidas = ["desayuno","almuerzo","comida","merienda","cena"];

function crearSemana() {
  const contenedor = document.getElementById("contenedor");

  if (!contenedor) {
    console.error("No existe el contenedor");
    return;
  }

  dias.forEach(dia => {
    let card = document.createElement("div");
    card.className = "dia-card";

    let contenido = "";

    contenido += `
      <div class="dia-header">
        <span>${dia.toUpperCase()}</span>
        <input type="number" placeholder="Créditos">
      </div>
    `;

    comidas.forEach(c => {
      contenido += `
        <div class="comida">
          <h4>${c.toUpperCase()}</h4>
          <input type="text" placeholder="Añadir comida...">
        </div>
      `;
    });

    card.innerHTML = contenido;
    contenedor.appendChild(card);
  });
}

function volver() {
  window.location.href = "../index.html";
}

window.addEventListener("load", function() {
  crearSemana();
});
</script>

</body>
</html>

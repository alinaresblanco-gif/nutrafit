<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Menú Semanal</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f0f0f0;
}

.header {
  position: fixed;
  top: 0;
  width: 100%;
  background: #2e7d32;
  color: white;
  display: flex;
  align-items: center;
  padding: 10px;
}

.header h1 {
  flex: 1;
  text-align: center;
  margin: 0;
}

.contenedor {
  margin-top: 70px;
  padding: 10px;
}

.dia-card {
  background: white;
  border-radius: 10px;
  margin-bottom: 15px;
  padding: 10px;
}

.dia-header {
  background: #2e7d32;
  color: white;
  padding: 8px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
}

.comida {
  margin-top: 10px;
}

.comida h4 {
  color: #2e7d32;
}
</style>
</head>

<body>

<header class="header">
  <button onclick="volver()">←</button>
  <h1>MI MENÚ SEMANAL</h1>
</header>

<div class="contenedor">

<!-- LUNES -->
<div class="dia-card">
  <div class="dia-header">
    <span>LUNES</span>
    <input type="number" placeholder="Créditos">
  </div>

  <div class="comida"><h4>DESAYUNO</h4><input></div>
  <div class="comida"><h4>ALMUERZO</h4><input></div>
  <div class="comida"><h4>COMIDA</h4><input></div>
  <div class="comida"><h4>MERIENDA</h4><input></div>
  <div class="comida"><h4>CENA</h4><input></div>
</div>

<!-- MARTES -->
<div class="dia-card">
  <div class="dia-header">
    <span>MARTES</span>
    <input type="number" placeholder="Créditos">
  </div>

  <div class="comida"><h4>DESAYUNO</h4><input></div>
  <div class="comida"><h4>ALMUERZO</h4><input></div>
  <div class="comida"><h4>COMIDA</h4><input></div>
  <div class="comida"><h4>MERIENDA</h4><input></div>
  <div class="comida"><h4>CENA</h4><input></div>
</div>

<!-- (puedes copiar esto para miércoles a domingo) -->

</div>

<script>
function volver() {
  window.location.href = "../index.html";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NutraFit - Diario de Comida</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --verde-corp: #78a978;
            --verde-oscuro: #5a8a5a;
            --blanco: #ffffff;
            --gris-fondo: #f4f7f4;
            --rojo-alerta: #e74c3c;
            --sombra: 0 4px 12px rgba(0,0,0,0.1);
        }

        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background-color: var(--gris-fondo); color: #333;
        }

        /* --- CABECERA --- */
        .cabecera {
            background-color: var(--verde-corp);
            padding: 15px; display: flex; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }

        .btn-retroceso {
            background: transparent; border: none; color: white;
            font-size: 1.4rem; padding-right: 15px; text-decoration: none;
        }

        .titulo-cabecera {
            color: white; font-weight: bold; flex-grow: 1; text-align: center; margin-right: 30px;
        }

        .contenedor-diario { padding: 15px; padding-bottom: 100px; }

        /* --- FICHA DÍA --- */
        .dia-ficha {
            background: white; border-radius: 12px; margin-bottom: 10px;
            overflow: hidden; box-shadow: var(--sombra); border: 1px solid #e0e0e0;
        }

        .dia-header {
            padding: 15px; display: flex; justify-content: space-between;
            align-items: center; cursor: pointer;
        }

        .dia-titulo { font-weight: bold; color: var(--verde-oscuro); font-size: 1.1rem; }

        .creditos-info { display: flex; gap: 8px; align-items: center; }

        .caja-creditos { display: flex; flex-direction: column; align-items: center; }
        .label-mini { font-size: 0.6rem; color: #888; margin-bottom: 2px; }

        .input-puntos {
            width: 40px; height: 28px; border: 1.5px solid var(--verde-corp);
            border-radius: 6px; text-align: center; font-weight: bold; outline: none;
        }

        .restante-badge {
            min-width: 40px; height: 28px; background: #eee;
            border-radius: 6px; display: flex; align-items: center;
            justify-content: center; font-weight: bold; font-size: 0.9rem;
        }

        /* --- CUERPO --- */
        .dia-contenido { display: none; padding: 10px 15px; border-top: 1px solid #f0f0f0; }
        .dia-ficha.abierto .dia-contenido { display: block; }

        .momento-bloque {
            background: #fafafa; margin-bottom: 10px;
            padding: 10px; border-radius: 8px;
        }

        .momento-header {
            display: flex; justify-content: space-between; align-items: center;
        }

        .momento-nombre { font-weight: bold; color: var(--verde-corp); font-size: 0.9rem; }

        .btn-anadir {
            background: var(--verde-corp); color: white; border: none;
            width: 28px; height: 28px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
        }

        /* --- BOTÓN GUARDAR --- */
        .btn-flotante-guardar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: var(--verde-corp); color: white; padding: 12px 30px;
            border-radius: 25px; font-weight: bold; text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1001;
        }
    </style>
</head>
<body>

    <header class="cabecera">
        <a href="../index.html" class="btn-retroceso"><i class="fas fa-arrow-left"></i></a>
        <div class="titulo-cabecera">MI MENÚ SEMANAL</div>
    </header>

    <div class="contenedor-diario" id="lista-dias">
        </div>

    <a href="#" class="btn-flotante-guardar" onclick="guardarEnExcel()">
        <i class="fas fa-save"></i> GUARDAR SEMANA
    </a>

    <script>
        const dias = ["LUNES", "MARTES", "MIÉRCOLES", "JUEVES", "VIERNES", "SÁBADO", "DOMINGO"];
        const momentos = ["Desayuno", "Almuerzo", "Comida", "Merienda", "Cena"];

        function renderizarDias() {
            const contenedor = document.getElementById('lista-dias');
            let html = '';

            dias.forEach((dia, index) => {
                html += `
                <div class="dia-ficha" id="ficha-${index}">
                    <div class="dia-header" onclick="toggleDia(${index})">
                        <div class="dia-titulo">${dia}</div>
                        <div class="creditos-info">
                            <div class="caja-creditos">
                                <span class="label-mini">BASE</span>
                                <input type="number" class="input-puntos" id="base-${index}" 
                                       onclick="event.stopPropagation()" 
                                       oninput="calcularDia(${index})" placeholder="00">
                            </div>
                            <div class="caja-creditos">
                                <span class="label-mini">RESTAN</span>
                                <div class="restante-badge" id="restante-${index}">0</div>
                            </div>
                            <i class="fas fa-chevron-down" style="color:#ccc; margin-left:5px"></i>
                        </div>
                    </div>
                    <div class="dia-contenido">
                        ${momentos.map(m => `
                            <div class="momento-bloque">
                                <div class="momento-header">
                                    <span class="momento-nombre">${m}</span>
                                    <button class="btn-anadir" onclick="abrirDespensa('${dia}', '${m}')">
                                        <i class="fas fa-plus"></i>
                                    </button>
                                </div>
                                <div id="items-${index}-${m}" style="margin-top:5px; font-size:0.8rem; color:#666">
                                    Sin ingredientes...
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            });
            contenedor.innerHTML = html;
        }

        function toggleDia(index) {
            const ficha = document.getElementById(`ficha-${index}`);
            const estaAbierto = ficha.classList.contains('abierto');
            document.querySelectorAll('.dia-ficha').forEach(f => f.classList.remove('abierto'));
            if (!estaAbierto) ficha.classList.add('abierto');
        }

        function calcularDia(index) {
            const base = parseInt(document.getElementById(`base-${index}`).value) || 0;
            const badge = document.getElementById(`restante-${index}`);
            // Por ahora solo resta de la base (luego sumaremos los ingredientes)
            badge.innerText = base;
            badge.style.color = base < 0 ? 'red' : '#333';
        }

        function abrirDespensa(dia, momento) {
            alert("Abriendo despensa para: " + dia + " - " + momento);
        }

        function guardarEnExcel() {
            alert("Guardando datos...");
        }

        // Ejecutar al cargar la página
        window.onload = renderizarDias;
    </script>
</body>
</html>

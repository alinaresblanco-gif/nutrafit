<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutraFit - Menús</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root { --verde: #78a978; --verde-osc: #5a8a5a; --fondo: #f8f9fa; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--fondo); }
        
        .cabecera-fija { background: var(--verde); padding: 15px; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 1000; }
        .btn-nav { background: rgba(255,255,255,0.2); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        /* DESPENSA MINI (SISTEMA INTEGRADO) */
        #despensa-mini-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 85vh; background: white; z-index: 5000; box-shadow: 0 5px 25px rgba(0,0,0,0.3); border-radius: 0 0 25px 25px; overflow: hidden; }
        .lista-mini-scroll { height: calc(85vh - 120px); overflow-y: auto; padding: 15px; }
        .cabecera-grupo { background: #f1f8f1; color: #4a6d4a; padding: 10px; font-weight: bold; font-size: 0.85rem; margin-top: 10px; border-radius: 8px; }
        .fila-alimento { border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: 0.2s; }
        .fila-alimento:active { background: #f9fdf9; }
        .credito-badge { background: var(--verde); color: white; padding: 3px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }

        /* FICHAS Y ACORDEÓN */
        .dia-ficha { margin: 12px 15px; border-radius: 15px; border: 1px solid #e0e0e0; background: white; overflow: hidden; }
        .dia-header { background: var(--verde); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .dia-cuerpo { padding: 15px; display: none; }
        .dia-ficha.activo .dia-cuerpo { display: block; }
        
        .input-puntos-dia, .input-restantes-dia { width: 45px; border: none; text-align: center; font-weight: bold; border-radius: 5px; padding: 4px; }
        .input-puntos-dia { color: var(--verde-osc); background: white; }
        .input-restantes-dia { color: #d35400; background: white; }

        .momento-seccion { margin-bottom: 20px; }
        .momento-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .momento-titulo { color: var(--verde); font-weight: bold; font-size: 0.85rem; text-transform: uppercase; border-left: 3px solid var(--verde); padding-left: 10px; }
        
        .fila-ingrediente { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
        .input-ingrediente { flex-grow: 1; border: none; outline: none; font-size: 0.95rem; color: #444; }
        .input-puntos-ing { width: 40px; border: none; background: #f7f7f7; text-align: center; font-weight: bold; color: var(--verde-osc); border-radius: 5px; padding: 5px; }

        /* MODAL NUEVO MENÚ */
        .modal-nuevo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 2000; backdrop-filter: blur(3px); }
        .modal-contenido { position: absolute; bottom: 0; width: 100%; height: 95vh; background: white; border-radius: 25px 25px 0 0; display: flex; flex-direction: column; overflow: hidden; }
        .scroll-area { flex-grow: 1; overflow-y: auto; padding-bottom: 60px; }
    </style>
</head>
<body>

    <div id="despensa-mini-container">
        <div style="background: var(--verde); padding: 15px; display: flex; justify-content: space-between; align-items: center; color: white;">
            <span style="font-weight: bold;"><i class="fas fa-search"></i> SELECCIONAR ALIMENTO</span>
            <button onclick="cerrarDespensaMini()" class="btn-nav"><i class="fas fa-times"></i></button>
        </div>
        <div style="padding: 12px; background: var(--verde);">
            <input type="text" id="bus-mini" style="width: 100%; padding: 12px; border-radius: 25px; border: none; outline: none;" placeholder="Buscar en mi despensa..." onkeyup="filtrarMini()">
        </div>
        <div id="lista-mini-contenido" class="lista-mini-scroll"></div>
    </div>

    <header class="cabecera-fija">
        <button onclick="location.reload()" class="btn-nav"><i class="fas fa-sync-alt"></i></button>
        <span style="font-weight: bold; letter-spacing: 1px;">MIS MENÚS SEMANALES</span>
        <button onclick="abrirNuevoMenu()" class="btn-nav" style="background:white; color:var(--verde)"><i class="fas fa-plus"></i></button>
    </header>
    <div id="modal-nuevo" class="modal-nuevo">
        <div class="modal-contenido">
            <div style="background: var(--verde); padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center;">
                <button class="btn-nav" onclick="cerrarNuevoMenu()"><i class="fas fa-chevron-down"></i></button>
                <div style="font-weight: bold;">PLANIFICACIÓN SEMANAL</div>
                <button class="btn-nav" onclick="guardarMenu()"><i class="fas fa-save"></i></button>
            </div>
            
            <div class="scroll-area" id="contenedor-fichas-real">
                </div>
        </div>
    </div>

    <script>
        let inventarioCompleto = [];
        let inputDestinoNombre = null;
        let inputDestinoPuntos = null;

        // Función para generar los 7 días con sus 5 momentos cada uno
        function generarEstructuraSemanas() {
            const dias = ["LUNES", "MARTES", "MIERCOLES", "JUEVES", "VIERNES", "SABADO", "DOMINGO"];
            const momentos = ["Desayuno", "Almuerzo", "Comida", "Merienda", "Cena"];
            const contenedor = document.getElementById('contenedor-fichas-real');
            
            let html = `<div style="padding: 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
                            <label style="color: var(--verde); font-weight: bold;">FECHA INICIO:</label>
                            <input type="date" id="fecha-inicio" style="border: none; background: #f0f0f0; padding: 8px; border-radius: 8px;">
                        </div>`;

            dias.forEach((dia, index) => {
                const activo = index === 0 ? "activo" : "";
                html += `
                <div class="dia-ficha ${activo}" id="ficha-${dia.toLowerCase()}">
                    <div class="dia-header" onclick="toggleDia('ficha-${dia.toLowerCase()}')">
                        <strong>${dia}</strong>
                        <div style="display: flex; gap: 10px;">
                            <div style="text-align:center"><span style="font-size:9px; display:block">TOTAL</span>
                                <input type="number" class="input-puntos-dia" value="0" onclick="event.stopPropagation()" oninput="actualizarPuntosDia(this)">
                            </div>
                            <div style="text-align:center"><span style="font-size:9px; display:block">RESTA</span>
                                <input type="number" class="input-restantes-dia" value="0" readonly>
                            </div>
                        </div>
                    </div>
                    <div class="dia-cuerpo">
                        ${momentos.map(m => `
                            <div class="momento-seccion">
                                <div class="momento-header">
                                    <span class="momento-titulo">${m}</span>
                                    <button class="btn-nav" style="background:var(--verde); width:30px; height:30px;" onclick="abrirDespensaMini(this)">
                                        <i class="fas fa-plus" style="font-size: 12px;"></i>
                                    </button>
                                </div>
                                <div class="lista-ingredientes">
                                    <div class="fila-ingrediente">
                                        <input type="text" class="input-ingrediente" placeholder="Escribir o pulsar +..." oninput="verificarFilaNueva(this)">
                                        <input type="number" class="input-puntos-ing" value="0" oninput="actualizarPuntosDia(this)">
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            });
            contenedor.innerHTML = html;
        }

        function abrirNuevoMenu() { 
            document.getElementById('modal-nuevo').style.display = 'block'; 
            if(!document.getElementById('fecha-inicio')) generarEstructuraSemanas();
        }

        function cerrarNuevoMenu() { document.getElementById('modal-nuevo').style.display = 'none'; }

        function toggleDia(id) {
            document.querySelectorAll('.dia-ficha').forEach(f => f.classList.remove('activo'));
            document.getElementById(id).classList.add('activo');
        }

        function abrirDespensaMini(btn) {
            const lista = btn.closest('.momento-seccion').querySelector('.lista-ingredientes');
            const filas = lista.querySelectorAll('.fila-ingrediente');
            let filaVacia = Array.from(filas).find(f => f.querySelector('.input-ingrediente').value.trim() === "") || filas[filas.length - 1];
            
            inputDestinoNombre = filaVacia.querySelector('.input-ingrediente');
            inputDestinoPuntos = filaVacia.querySelector('.input-puntos-ing');

            document.getElementById('despensa-mini-container').style.display = 'block';
            if (inventarioCompleto.length === 0) {
                google.script.run.withSuccessHandler(datos => {
                    inventarioCompleto = datos;
                    renderizarMini(datos);
                }).obtenerAlimentosDespensa();
            } else {
                renderizarMini(inventarioCompleto);
            }
        }

        function renderizarMini(lista) {
            const contenedor = document.getElementById('lista-mini-contenido');
            contenedor.innerHTML = '';
            const grupos = {};
            lista.forEach(item => { if(!grupos[item.Categoria]) grupos[item.Categoria] = []; grupos[item.Categoria].push(item); });

            for (let cat in grupos) {
                let htmlCat = `<div class="cabecera-grupo">${cat}</div><table style="width:100%">`;
                grupos[cat].forEach(item => {
                    htmlCat += `<tr class="fila-alimento" onclick="seleccionarMini('${item.Nombre.replace(/'/g, "\\'")}', ${item.Netos})">
                        <td style="padding:12px; font-size:14px;">${item.Nombre}</td>
                        <td style="text-align:right; padding:12px;"><span class="credito-badge">${item.Netos} pts</span></td>
                    </tr>`;
                });
                contenedor.innerHTML += htmlCat + "</table>";
            }
        }

        function seleccionarMini(n, p) {
            inputDestinoNombre.value = n;
            inputDestinoPuntos.value = p;
            verificarFilaNueva(inputDestinoNombre);
            actualizarPuntosDia(inputDestinoPuntos);
            cerrarDespensaMini();
        }

        function cerrarDespensaMini() { document.getElementById('despensa-mini-container').style.display = 'none'; }

        function filtrarMini() {
            const val = document.getElementById('bus-mini').value.toLowerCase();
            document.querySelectorAll('.fila-alimento').forEach(f => f.style.display = f.innerText.toLowerCase().includes(val) ? "" : "none");
        }

        function verificarFilaNueva(input) {
            const lista = input.closest('.lista-ingredientes');
            const filas = lista.querySelectorAll('.fila-ingrediente');
            if (input.parentElement === filas[filas.length - 1] && input.value.trim() !== "") {
                const nueva = document.createElement('div');
                nueva.className = 'fila-ingrediente';
                nueva.innerHTML = `<input type="text" class="input-ingrediente" placeholder="Añadir..." oninput="verificarFilaNueva(this)">
                                   <input type="number" class="input-puntos-ing" value="0" oninput="actualizarPuntosDia(this)">`;
                lista.appendChild(nueva);
            }
        }

        function actualizarPuntosDia(el) {
            const ficha = el.closest('.dia-ficha');
            const total = parseFloat(ficha.querySelector('.input-puntos-dia').value) || 0;
            const consumido = Array.from(ficha.querySelectorAll('.input-puntos-ing')).reduce((acc, i) => acc + (parseFloat(i.value) || 0), 0);
            const resta = total - consumido;
            const display = ficha.querySelector('.input-restantes-dia');
            display.value = resta;
            display.style.backgroundColor = resta < 0 ? "#e74c3c" : "white";
            display.style.color = resta < 0 ? "white" : "#d35400";
        }
    </script>
</body>
</html>

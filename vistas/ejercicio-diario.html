<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NutraFit - Mi Actividad</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #f4f4f4; color: #333; }
        .vista-cabecera-fija { height: auto; position: relative; }
        .cabecera-barra { background: #78a978; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .boton-nav-circular { background: rgba(255,255,255,0.2); border:none; color:white; width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
        .titulo-vista { font-weight: bold; font-size: 16px; }
        .contenedor-principal-ejercicio { background: #78a978; padding: 10px 15px 20px 15px; }
        .fila-selectores-actividad { display: flex; justify-content: space-between; padding: 15px 0; }
        .btn-actividad-selector { background: rgba(255,255,255,0.2); color:white; border:none; width:65px; height:65px; border-radius:50%; font-size:24px; display:flex; align-items:center; justify-content:center; transition: 0.3s; }
        .btn-actividad-selector.activo { background:white; color:#78a978; box-shadow: 0 0 15px white; }
        .fila-botones-imagen-moderna { display: flex; gap: 10px; margin-bottom: 12px; }
        .btn-subir-imagen-blanco { flex:1; background:white; border:none; color:#78a978; padding:12px; border-radius:10px; font-weight:bold; font-size:12px; display:flex; align-items:center; justify-content:center; gap:5px; }
        .contenedor-formulario-datos { background: white; padding: 12px; border-radius: 15px; margin-bottom: 10px; }
        .fila-datos { display: flex; gap: 8px; margin-bottom: 8px; }
        .grupo-input { flex: 1; }
        .etiqueta-verde { color: #78a978; font-size: 10px; font-weight: bold; display: block; margin-bottom: 3px; }
        .input-app-form { width: 100%; border: 1px solid #eee; padding: 10px; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .input-app-form.readonly { background: #f5f5f5; color: #999; }
        .btn-strava-enlace { background: #2196F3; color: white; width: 100%; padding: 14px; border-radius: 12px; border:none; font-weight:bold; margin-bottom:10px; display:flex; align-items:center; justify-content:center; gap:8px; font-size: 14px; }
        .btn-guardar-principal { background: #78a978; color: white; border: 2px solid white; width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; display:flex; align-items:center; justify-content:center; gap:8px; cursor: pointer; }
        .btn-reiniciar { background: #666 !important; margin-top: 10px; border:none !important; }
        .solapa-progreso-hoy { margin-top: 10px; padding: 0 15px; }
        .tarjeta-info-creditos { background: linear-gradient(135deg, #78a978, #5a8a5a); color: white; padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 15px; }
        .contenido-scroll-registros { padding: 15px; }
        .subtitulo-seccion { color: #333; font-size: 14px; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="vista-cabecera-fija"> 
    <div class="cabecera-barra">
        <button onclick="window.history.back()" class="boton-nav-circular">
            <i class="fas fa-chevron-left"></i>
        </button>
        <span class="titulo-vista">MI ACTIVIDAD FÍSICA</span>
        <div style="width:38px;"></div> 
    </div>

    <div class="contenedor-principal-ejercicio">
        <div class="fila-selectores-actividad">
            <button class="btn-actividad-selector activo" id="btn-walk" onclick="seleccionarActividad('Caminar')">
                <i class="fas fa-walking"></i>
            </button>
            <button class="btn-actividad-selector" id="btn-bike" onclick="seleccionarActividad('Ciclismo')">
                <i class="fas fa-bicycle"></i>
            </button>
            <button class="btn-actividad-selector" id="btn-gym" onclick="seleccionarActividad('Gimnasio')">
                <i class="fas fa-dumbbell"></i>
            </button>
        </div>

        <div class="fila-botones-imagen-moderna">
            <input type="file" id="input-captura" accept="image/*" style="display: none;" onchange="previsualizarImagen(this)">
            <button onclick="document.getElementById('input-captura').click()" class="btn-subir-imagen-blanco">
                <i class="fas fa-image"></i> Subir Captura
            </button>
            <button onclick="alert('Cámara no disponible en web')" class="btn-subir-imagen-blanco">
                <i class="fas fa-camera"></i> Hacer Foto
            </button>
        </div>
        
        <div id="previsualizacion-contenedor" style="display:none; margin-bottom:10px; position:relative;">
            <img id="img-previa" src="" style="width:100%; border-radius:10px; max-height:200px; object-fit:cover; border: 2px solid white;">
            <button onclick="document.getElementById('previsualizacion-contenedor').style.display='none'" style="position:absolute; top:5px; right:5px; background:white; border-radius:50%; width:25px; height:25px; border:none; color:red;">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="contenedor-formulario-datos">
            <div class="fila-datos">
                <div class="grupo-input">
                    <label class="etiqueta-verde">TIEMPO (MIN)</label>
                    <input type="number" id="ej-tiempo" class="input-app-form" placeholder="0">
                </div>
                <div class="grupo-input">
                    <label class="etiqueta-verde">PASOS (CALC)</label>
                    <input type="text" id="ej-pasos" class="input-app-form" placeholder="0">
                </div>
            </div>
            <div class="fila-datos">
                <div class="grupo-input">
                    <label class="etiqueta-verde">DISTANCIA (KM)</label>
                    <input type="number" id="ej-distancia" step="0.01" class="input-app-form" placeholder="0.00">
                </div>
                <div class="grupo-input">
                    <label class="etiqueta-verde">DESNIVEL (M)</label>
                    <input type="number" id="ej-desnivel" class="input-app-form" placeholder="0">
                </div>
            </div>
        </div>

        <button onclick="abrirGpsTracker()" class="btn-strava-enlace">
            <i class="fas fa-map-marked-alt"></i> ABRIR MI NAVEGADOR GPS
        </button>

        <button onclick="validarYGuardarEjercicio()" class="btn-guardar-principal">
            <i class="fas fa-cloud-upload-alt"></i> GUARDAR ENTRENAMIENTO
        </button>

        <button onclick="reiniciarFormularioEjercicio()" class="btn-guardar-principal btn-reiniciar">
            <i class="fas fa-redo-alt"></i> LIMPIAR VISTA
        </button>
    </div>
</div>

<div class="solapa-progreso-hoy">
    <div class="tarjeta-info-creditos">
        <i class="fas fa-fire"></i>
        <div>
            <strong>Hoy llevas:</strong>
            <span id="minutos-hoy-resumen">0 min</span>
        </div>
    </div>
</div>

<div class="contenido-scroll-registros">
    <h3 class="subtitulo-seccion">TUS ACTIVIDADES RECIENTES</h3>
    <div id="lista-actividades-historial"></div>
</div>

<script>
    // CARGAR DATOS DEL GPS AL INTRAR
    document.addEventListener('DOMContentLoaded', () => {
        if(localStorage.getItem('gps_distancia')) {
            document.getElementById('ej-distancia').value = localStorage.getItem('gps_distancia');
            document.getElementById('ej-tiempo').value    = localStorage.getItem('gps_tiempo');
            document.getElementById('ej-pasos').value     = localStorage.getItem('gps_pasos');
            document.getElementById('ej-desnivel').value  = localStorage.getItem('gps_desnivel');
            console.log("Datos GPS sincronizados");
        }
    });

    function abrirGpsTracker() {
        window.location.href = 'gps-tracker.html';
    }

    function seleccionarActividad(tipo) {
        document.querySelectorAll('.btn-actividad-selector').forEach(b => b.classList.remove('activo'));
        event.currentTarget.classList.add('activo');
    }

    function reiniciarFormularioEjercicio() {
        if(confirm("¿Limpiar los datos de la pantalla?")) {
            localStorage.removeItem('gps_distancia');
            localStorage.removeItem('gps_tiempo');
            localStorage.removeItem('gps_pasos');
            localStorage.removeItem('gps_desnivel');
            window.location.reload();
        }
    }

    function validarYGuardarEjercicio() {
        alert("¡Ejercicio guardado en tu historial!");
    }
</script>
</body>
</html>

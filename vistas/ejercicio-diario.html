<div class="vista-cabecera-fija" style="height: 410px;"> 
    <div class="cabecera-barra">
        <button onclick="volverInicio()" class="boton-nav-circular">
            <i class="fas fa-chevron-left"></i>
        </button>
        <span class="titulo-vista">MI ACTIVIDAD FÍSICA</span>
        <button onclick="abrirVista('historial-ejercicios')" class="boton-nav-circular">
            <i class="fas fa-history"></i>
        </button>
    </div>

    <div class="contenedor-principal-ejercicio" style="background: #78a978; padding: 10px 15px 20px 15px;">
        
        <div class="fila-selectores-actividad">
            <button class="btn-actividad-selector activo" id="btn-walk" onclick="seleccionarActividad('Caminar')">
                <i class="fas fa-walking"></i>
            </button>
            <button class="btn-actividad-selector" id="btn-bike" onclick="seleccionarActividad('Ciclismo')">
                <i class="fas fa-bicycle"></i>
            </button>
            <button class="btn-actividad-selector" id="btn-gym" onclick="seleccionarActividad('Gimnasio')">
                <i class="fas fa-dumbbell"></i>
            </button>
        </div>

        <div class="fila-botones-imagen-moderna">
            <input type="file" id="input-captura" accept="image/*" style="display: none;" onchange="previsualizarImagen(this)">
            
            <button onclick="document.getElementById('input-captura').click()" class="btn-subir-imagen-blanco">
                <i class="fas fa-image"></i> Subir Captura
            </button>
            
            <button onclick="intentarHacerFoto()" class="btn-subir-imagen-blanco">
                <i class="fas fa-camera"></i> Hacer Foto
            </button>
        </div>
        
        <div id="previsualizacion-contenedor" style="display: none; margin-bottom: 10px;">
            <img id="img-previa" src="" alt="Previa">
            <button onclick="quitarImagen()" class="btn-quitar-img"><i class="fas fa-times-circle"></i></button>
        </div>

        <div class="contenedor-formulario-datos">
            <div class="fila-datos">
                <div class="grupo-input">
                    <label class="etiqueta-verde">TIEMPO (MIN)</label>
                    <input type="number" id="ej-tiempo" placeholder="0" class="input-app-form">
                </div>
                <div class="grupo-input">
                    <label class="etiqueta-verde">PASOS (CALC)</label>
                    <input type="text" id="ej-pasos" placeholder="0" class="input-app-form readonly" readonly>
                </div>
            </div>
            <div class="fila-datos">
                <div class="grupo-input">
                    <label class="etiqueta-verde">DISTANCIA (KM)</label>
                    <input type="number" id="ej-distancia" placeholder="0.00" step="0.01" class="input-app-form">
                </div>
                <div class="grupo-input">
                    <label class="etiqueta-verde">DESNIVEL (M)</label>
                    <input type="number" id="ej-desnivel" placeholder="0" class="input-app-form">
                </div>
            </div>
        </div>

        <button onclick="abrirStravaExterno()" class="btn-strava-enlace">
            <i class="fab fa-strava"></i> ABRIR STRAVA
        </button>

        <button onclick="validarYGuardarEjercicio()" class="btn-guardar-principal">
            <i class="fas fa-cloud-upload-alt"></i> GUARDAR ENTRENAMIENTO
        </button>
        <button onclick="reiniciarFormularioEjercicio()" class="btn-guardar-principal" style="background: #666; margin-top: 10px; border-color: #999;">
    <i class="fas fa-redo-alt"></i> REINICIAR / LIMPIAR VISTA
</button>
    </div>
</div>

<div class="solapa-progreso-hoy" style="margin-top: 420px; padding: 0 15px;">
    <div class="tarjeta-info-creditos">
        <i class="fas fa-fire"></i>
        <div>
            <strong>Hoy llevas:</strong>
            <span id="minutos-hoy-resumen">0 min</span>
        </div>
    </div>
</div>

<div class="contenido-scroll-registros" style="margin-top: 490px; padding: 10px;">
    <h3 class="subtitulo-seccion">TUS ACTIVIDADES RECIENTES</h3>
    <div id="lista-actividades-historial" class="contenedor-historial-strava">
        <div class="vacio-mensaje">No hay actividades recientes.</div>
    </div>
</div>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NutraFit - Formulario Menú</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <style>
        :root {
            --verde-corp: #78a978; /* Tu verde corporativo */
            --verde-oscuro: #5a8a5a;
            --blanco: #ffffff;
            --gris-fondo: #f4f7f4;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--gris-fondo);
            /* Añadimos padding arriba para que el contenido no se esconda bajo la cabecera fija */
            padding-top: 70px; 
        }

        /* --- CABECERA FIJA --- */
        .cabecera {
            background-color: var(--verde-corp);
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            position: fixed; /* Fijamos la cabecera arriba */
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Botón de retroceso transparente */
        .btn-retroceso {
            background-color: rgba(255, 255, 255, 0.2); /* Verde transparente sobre fondo verde */
            color: var(--blanco);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.2rem;
            transition: background 0.3s ease;
        }

        .btn-retroceso:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        /* Título centrado */
        .titulo-cabecera {
            color: var(--blanco);
            font-weight: bold;
            font-size: 1rem;
            flex-grow: 1;
            text-align: center;
            margin-right: 40px; /* Para compensar el ancho del botón y que quede centrado real */
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        /* --- CONTENEDOR PRINCIPAL DE FICHAS --- */
.contenedor-semana {
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 12px; /* Espacio entre cada ficha */
}

.dia-ficha {
    background: var(--blanco);
    border-radius: 12px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.05);
    border: 1px solid #e0e0e0;
    overflow: hidden;
}

.dia-header {
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
}

.dia-nombre {
    font-weight: 800;
    color: var(--verde-oscuro);
    font-size: 1rem;
}

/* --- BLOQUE DE PUNTOS (DERECHA) --- */
.puntos-header {
    display: flex;
    gap: 10px;
    align-items: center;
}

.punto-item {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.label-mini {
    font-size: 0.6rem;
    color: #999;
    font-weight: bold;
    margin-bottom: 2px;
}

.input-puntos {
    width: 45px;
    height: 30px;
    border: 2px solid var(--verde-corp);
    border-radius: 6px;
    text-align: center;
    font-weight: bold;
    outline: none;
    color: #333;
}

.caja-restante {
    min-width: 45px;
    height: 30px;
    background: #f0f0f0;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 0.9rem;
    color: #555;
}

.flecha-icon {
    color: #ccc;
    margin-left: 5px;
    font-size: 0.9rem;
}
    </style>
</head>
<body>

    <header class="cabecera">
        <a href="index.html" class="btn-retroceso">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div class="titulo-cabecera">FORMULARIO MENÚ SEMANAL</div>
    </header>
<div class="contenedor-semana">

    <div class="dia-ficha" id="ficha-0">
        <div class="dia-header">
            <div class="dia-nombre">LUNES</div>
            
            <div class="puntos-header">
                <div class="punto-item">
                    <span class="label-mini">BASE</span>
                    <input type="number" class="input-puntos" id="base-0" placeholder="0">
                </div>
                
                <div class="punto-item">
                    <span class="label-mini">RESTAN</span>
                    <div class="caja-restante" id="restante-0">0</div>
                </div>

                <i class="fas fa-chevron-down flecha-icon"></i>
            </div>
        </div>
        
        <div class="dia-contenido" style="display:none;">
            </div>
    </div>

</div>
    </body>
</html>

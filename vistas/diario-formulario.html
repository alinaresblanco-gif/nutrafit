<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NutraFit - Formulario Menú</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <style>
        :root {
            --verde-corp: #78a978; /* Tu verde corporativo */
            --verde-oscuro: #5a8a5a;
            --blanco: #ffffff;
            --gris-fondo: #f4f7f4;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--gris-fondo);
            /* Añadimos padding arriba para que el contenido no se esconda bajo la cabecera fija */
            padding-top: 70px; 
        }

        /* --- CABECERA FIJA --- */
        .cabecera {
            background-color: var(--verde-corp);
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            position: fixed; /* Fijamos la cabecera arriba */
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Botón de retroceso transparente */
        .btn-retroceso {
            background-color: rgba(255, 255, 255, 0.2); /* Verde transparente sobre fondo verde */
            color: var(--blanco);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.2rem;
            transition: background 0.3s ease;
        }

        .btn-retroceso:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        /* Título centrado */
        .titulo-cabecera {
            color: var(--blanco);
            font-weight: bold;
            font-size: 1rem;
            flex-grow: 1;
            text-align: center;
            margin-right: 40px; /* Para compensar el ancho del botón y que quede centrado real */
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header class="cabecera">
        <a href="index.html" class="btn-retroceso">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div class="titulo-cabecera">FORMULARIO MENÚ SEMANAL</div>
    </header>

    </body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página en Construcción | NutraFit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --verde-corp: #78a978;
            --verde-oscuro: #5a8a5a;
            --gris-suave: #f4f7f4;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--gris-suave);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            text-align: center;
        }

        .contenedor {
            padding: 20px;
            max-width: 500px;
        }

        .icono-animado {
            font-size: 80px;
            color: var(--verde-corp);
            margin-bottom: 20px;
            animation: gear-spin 4s linear infinite;
        }

        @keyframes gear-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--verde-oscuro);
        }

        p {
            font-size: 1.1rem;
            color: #666;
            line-height: 1.6;
        }

        .progreso-bar {
            width: 100%;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            margin: 30px 0;
            overflow: hidden;
        }

        .progreso-fill {
            width: 65%; /* Puedes cambiar el porcentaje aquí */
            height: 100%;
            background: var(--verde-corp);
            border-radius: 5px;
        }

        .btn-volver {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background-color: var(--verde-corp);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-volver:hover {
            background-color: var(--verde-oscuro);
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <i class="fas fa-cog icono-animado"></i>
        <h1>¡Estamos trabajando en ello!</h1>
        <p>Esta sección de <strong>NutraFit</strong> se encuentra actualmente en construcción para ofrecerte la mejor experiencia posible.</p>
        
        <div class="progreso-bar">
            <div class="progreso-fill"></div>
        </div>
        
        <p><small>Progreso del desarrollo: 65%</small></p>
        
        <a href="index.html" class="btn-volver">
            <i class="fas fa-arrow-left"></i> Volver al Inicio
        </a>
    </div>

</body>
</html>

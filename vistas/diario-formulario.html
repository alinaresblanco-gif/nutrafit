<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NutraFit - Menú Semanal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --verde-corp: #78a978;
            --verde-oscuro: #5a8a5a;
            --gris-fondo: #f4f7f4;
            --naranja: #d35400;
            --blanco: #ffffff;
        }

        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background-color: var(--gris-fondo);
            display: flex; flex-direction: column; height: 100vh;
        }

        .header {
            background: var(--verde-corp); color: white;
            padding: 15px; text-align: center; font-weight: bold;
        }

        /* TABS SUPERIORES */
        .tabs-dias {
            display: flex; overflow-x: auto; background: white;
            padding: 10px 5px; gap: 8px; border-bottom: 1px solid #ddd;
        }
        .tab-btn {
            padding: 10px 18px; border-radius: 20px; border: 1px solid var(--verde-corp);
            background: white; color: var(--verde-corp); white-space: nowrap;
            cursor: pointer; font-weight: bold; font-size: 0.8rem;
        }
        .tab-btn.active { background: var(--verde-corp); color: white; }

        /* CONTENEDORES DE DÍA */
        .contenedor-principal { flex-grow: 1; overflow-y: auto; padding: 15px; padding-bottom: 120px; }
        .contenido-dia { display: none; }
        .contenido-dia.active { display: block; }

        /* TARJETAS DE MOMENTOS */
        .card-momento {
            background: white; border-radius: 15px; padding: 15px;
            margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .momento-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; border-left: 4px solid var(--verde-corp); padding-left: 10px;
        }
        .momento-titulo { color: var(--verde-corp); font-weight: bold; text-transform: uppercase; font-size: 0.85rem; }

        /* FILAS DE INGREDIENTES */
        .fila-ingrediente { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
        .input-txt { flex-grow: 1; border: 1px solid #eee; padding: 10px; border-radius: 8px; outline: none; font-size: 0.9rem; }
        .input-pts { width: 45px; border: 1px solid #eee; padding: 10px; border-radius: 8px; text-align: center; font-weight: bold; color: var(--verde-oscuro); }

        /* BARRA INFERIOR */
        .barra-puntos {
            position: fixed; bottom: 0; width: 100%; background: white;
            display: flex; justify-content: space-around; padding: 15px 0;
            border-top: 2px solid #eee; box-shadow: 0 -3px 10px rgba(0,0,0,0.05);
        }
        .box-pts { text-align: center; }
        .label-pts { font-size: 0.6rem; color: #888; display: block; }
        .val-pts { font-size: 1.1rem; font-weight: bold; color: var(--naranja); border: none; width: 50px; text-align: center; background: transparent; }
    </style>
</head>
<body>

    <div class="header">PLANIFICADOR SEMANAL</div>

    <div class="tabs-dias">
        <button class="tab-btn active" onclick="cambiarDia('lunes', this)">LUN</button>
        <button class="tab-btn" onclick="cambiarDia('martes', this)">MAR</button>
        <button class="tab-btn" onclick="cambiarDia('miercoles', this)">MIE</button>
        <button class="tab-btn" onclick="cambiarDia('jueves', this)">JUE</button>
        <button class="tab-btn" onclick="cambiarDia('viernes', this)">VIE</button>
        <button class="tab-btn" onclick="cambiarDia('sabado', this)">SAB</button>
        <button class="tab-btn" onclick="cambiarDia('domingo', this)">DOM</button>
    </div>

    <div class="contenedor-principal">
        
        <div id="lunes" class="contenido-dia active">
            <div class="card-momento">
                <div class="momento-header"><span class="momento-titulo">Desayuno</span><i class="fas fa-plus-circle" style="color: var(--verde-corp);"></i></div>
                <div class="fila-ingrediente">
                    <input type="text" class="input-txt" placeholder="¿Qué vas a desayunar?" oninput="actualizarPuntos()">
                    <input type="number" class="input-pts" value="0" oninput="actualizarPuntos()">
                </div>
            </div>
            <div class="card-momento">
                <div class="momento-header"><span class="momento-titulo">Almuerzo</span><i class="fas fa-plus-circle" style="color: var(--verde-corp);"></i></div>
                <div class="fila-ingrediente">
                    <input type="text" class="input-txt" placeholder="Tentempié..." oninput="actualizarPuntos()">
                    <input type="number" class="input-pts" value="0" oninput="actualizarPuntos()">
                </div>
            </div>
            <div class="card-momento">
                <div class="momento-header"><span class="momento-titulo">Comida</span><i class="fas fa-plus-circle" style="color: var(--verde-corp);"></i></div>
                <div class="fila-ingrediente">
                    <input type="text" class="input-txt" placeholder="Plato principal..." oninput="actualizarPuntos()">
                    <input type="number" class="input-pts" value="0" oninput="actualizarPuntos()">
                </div>
            </div>
            <div class="card-momento">
                <div class="momento-header"><span class="momento-titulo">Merienda</span><i class="fas fa-plus-circle" style="color: var(--verde-corp);"></i></div>
                <div class="fila-ingrediente">
                    <input type="text" class="input-txt" placeholder="Fruta, yogur..." oninput="actualizarPuntos()">
                    <input type="number" class="input-pts" value="0" oninput="actualizarPuntos()">
                </div>
            </div>
            <div class="card-momento">
                <div class="momento-header"><span class="momento-titulo">Cena</span><i class="fas fa-plus-circle" style="color: var(--verde-corp);"></i></div>
                <div class="fila-ingrediente">
                    <input type="text" class="input-txt" placeholder="Cena ligera..." oninput="actualizarPuntos()">
                    <input type="number" class="input-pts" value="0" oninput="actualizarPuntos()">
                </div>
            </div>
        </div>

        <div id="martes" class="contenido-dia">
            <div class="card-momento"><div class="momento-header"><span class="momento-titulo">Desayuno</span></div><div class="fila-ingrediente"><input type="text" class="input-txt" placeholder="Escribir..." oninput="actualizarPuntos()"><input type="number" class="input-pts" value="0" oninput="actualizarPuntos()"></div></div>
            <div class="card-momento"><div class="momento-header"><span class="momento-titulo">Comida</span></div><div class="fila-ingrediente"><input type="text" class="input-txt" placeholder="Escribir..." oninput="actualizarPuntos()"><input type="number" class="input-pts" value="0" oninput="actualizarPuntos()"></div></div>
            <div class="card-momento"><div class="momento-header"><span class="momento-titulo">Cena</span></div><div class="fila-ingrediente"><input type="text" class="input-txt" placeholder="Escribir..." oninput="actualizarPuntos()"><input type="number" class="input-pts" value="0" oninput="actualizarPuntos()"></div></div>
        </div>

        <div id="miercoles" class="contenido-dia">
            <div class="card-momento"><div class="momento-header"><span class="momento-titulo">MIÉRCOLES</span></div><div class="fila-ingrediente"><input type="text" class="input-txt" placeholder="Escribir..." oninput="actualizarPuntos()"><input type="number" class="input-pts" value="0" oninput="actualizarPuntos()"></div></div>
        </div>

        <div id="jueves" class="contenido-dia">
            <div class="card-momento"><div class="momento-header"><span class="momento-titulo">JUEVES</span></div><div class="fila-ingrediente"><input type="text" class="input-txt" placeholder="Escribir..." oninput="actualizarPuntos()"><input type="number" class="input-pts" value="0" oninput="actualizarPuntos()"></div></div>
        </div>

        <div id="viernes" class="contenido-dia">
            <div class="card-momento"><div class="momento-header"><span class="momento-titulo">VIERNES</span></div><div class="fila-ingrediente"><input type="text" class="input-txt" placeholder="Escribir..." oninput="actualizarPuntos()"><input type="number" class="input-pts" value="0" oninput="actualizarPuntos()"></div></div>
        </div>

        <div id="sabado" class="contenido-dia">
            <div class="card-momento"><div class="momento-header"><span class="momento-titulo">SÁBADO</span></div><div class="fila-ingrediente"><input type="text" class="input-txt" placeholder="Escribir..." oninput="actualizarPuntos()"><input type="number" class="input-pts" value="0" oninput="actualizarPuntos()"></div></div>
        </div>

        <div id="domingo" class="contenido-dia">
            <div class="card-momento"><div class="momento-header"><span class="momento-titulo">DOMINGO</span></div><div class="fila-ingrediente"><input type="text" class="input-txt" placeholder="Escribir..." oninput="actualizarPuntos()"><input type="number" class="input-pts" value="0" oninput="actualizarPuntos()"></div></div>
        </div>

    </div>

    <div class="barra-puntos">
        <div class="box-pts">
            <span class="label-pts">TOTAL DÍA</span>
            <input type="number" id="total-dia" class="val-pts" value="30" oninput="actualizarPuntos()">
        </div>
        <div class="box-pts">
            <span class="label-pts">RESTANTES</span>
            <input type="number" id="restantes-val" class="val-pts" value="30" readonly>
        </div>
    </div>

    <script>
        function cambiarDia(diaId, btn) {
            // Ocultar todos
            document.querySelectorAll('.contenido-dia').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.contenido-dia').forEach(c => c.style.display = 'none');

            // Quitar clase active de botones
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            // Mostrar seleccionado
            const seleccionado = document.getElementById(diaId);
            seleccionado.classList.add('active');
            seleccionado.style.display = 'block';
            btn.classList.add('active');
            
            actualizarPuntos();
        }

        function actualizarPuntos() {
            const diaActivo = document.querySelector('.contenido-dia.active');
            const inputs = diaActivo.querySelectorAll('.input-pts');
            let suma = 0;
            inputs.forEach(i => suma += parseFloat(i.value) || 0);
            
            const presupuesto = parseFloat(document.getElementById('total-dia').value) || 0;
            const restante = presupuesto - suma;
            
            const display = document.getElementById('restantes-val');
            display.value = restante;
            display.style.color = restante < 0 ? "red" : "var(--naranja)";
        }
    </script>
</body>
</html>

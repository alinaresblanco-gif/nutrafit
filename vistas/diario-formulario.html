<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NutraFit Fijo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <style>
        :root { --verde: #78a978; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: sans-serif; background: #f4f7f4; padding-bottom: 80px; }
        
        .header { background: var(--verde); color: white; padding: 15px; text-align: center; font-weight: bold; }

        /* NAVEGACIÓN SIMPLE */
        .tabs { display: flex; overflow-x: auto; background: #fff; padding: 10px; border-bottom: 1px solid #ddd; }
        .tab-btn { 
            padding: 10px 20px; margin-right: 5px; border: 1px solid var(--verde); 
            background: white; color: var(--verde); border-radius: 15px; font-weight: bold;
        }
        .active-btn { background: var(--verde) !important; color: white !important; }

        /* CONTENIDO */
        .seccion-dia { display: none; padding: 15px; }
        .visible { display: block !important; }

        .card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; }
        .card-h { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        /* INPUTS */
        .fila { display: flex; gap: 5px; margin-bottom: 5px; }
        input { padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .in-txt { flex-grow: 1; }
        .in-pts { width: 50px; text-align: center; font-weight: bold; }

        /* MODAL */
        #capa-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 10000; 
        }
        .modal-body { width: 95%; height: 80%; background: white; margin: 10% auto; border-radius: 15px; position: relative; }
        .btn-cerrar { position: absolute; top: -10px; right: -10px; background: red; color: white; border-radius: 50%; width: 30px; height: 30px; text-align: center; line-height: 30px; font-weight: bold; border: 2px solid white; }

        /* PUNTOS */
        .barra { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px; border-top: 2px solid #ddd; }
    </style>
</head>
<body>

    <div class="header">NUTRAFIT (VERSIÓN MÓVIL)</div>

    <div class="tabs">
        <button id="btn-lun" class="tab-btn active-btn" onclick="verDia('lun')">LUN</button>
        <button id="btn-mar" class="tab-btn" onclick="verDia('mar')">MAR</button>
        <button id="btn-mie" class="tab-btn" onclick="verDia('mie')">MIE</button>
    </div>

    <div id="dia-lun" class="seccion-dia visible">
        <div class="card">
            <div class="card-h">
                <b style="color:var(--verde)">DESAYUNO</b>
                <i class="fas fa-plus-circle" style="font-size: 25px; color: var(--verde);" onclick="abrirD()"></i>
            </div>
            <div class="fila">
                <input type="text" class="in-txt" placeholder="Ingrediente...">
                <input type="number" class="in-pts" value="0" oninput="sumar()">
            </div>
        </div>
        </div>

    <div id="dia-mar" class="seccion-dia">
        <div class="card"><b>MARTES</b><p>Contenido del martes...</p></div>
    </div>

    <div id="capa-modal">
        <div class="modal-body">
            <div class="btn-cerrar" onclick="cerrarD()">X</div>
            <iframe src="vistas/nuestra_despensa.html" style="width:100%; height:100%; border:none;"></iframe>
        </div>
    </div>

    <div class="barra">
        <div>TOTAL: <input type="number" id="t-p" value="30" style="width:40px; border:none;" oninput="sumar()"></div>
        <div>RESTAN: <b id="r-p" style="color:orange">30</b></div>
    </div>

    <script>
        // Lógica ultra-simple
        function verDia(id) {
            // 1. Ocultar todos los días
            document.getElementById('dia-lun').classList.remove('visible');
            document.getElementById('dia-mar').classList.remove('visible');
            // 2. Quitar color a botones
            document.getElementById('btn-lun').classList.remove('active-btn');
            document.getElementById('btn-mar').classList.remove('active-btn');

            // 3. Mostrar el seleccionado
            document.getElementById('dia-' + id).classList.add('visible');
            document.getElementById('btn-' + id).classList.add('active-btn');
            sumar();
        }

        function abrirD() {
            document.getElementById('capa-modal').style.display = 'block';
        }

        function cerrarD() {
            document.getElementById('capa-modal').style.display = 'none';
        }

        function sumar() {
            var diaActivo = document.querySelector('.seccion-dia.visible');
            var pts = diaActivo.querySelectorAll('.in-pts');
            var total = 0;
            for (var i = 0; i < pts.length; i++) {
                total += parseFloat(pts[i].value) || 0;
            }
            var pTotal = parseFloat(document.getElementById('t-p').value) || 0;
            var resta = pTotal - total;
            document.getElementById('r-p').innerText = resta;
            document.getElementById('r-p').style.color = resta < 0 ? "red" : "orange";
        }
    </script>
</body>
</html>

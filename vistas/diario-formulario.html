<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NutraFit Completo</title>
    <style>
        :root { --v: #78a978; --n: #d35400; --f: #f4f7f4; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--f); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header { background: var(--v); color: white; padding: 15px; text-align: center; font-weight: bold; flex-shrink: 0; font-size: 1.1rem; }

        /* NAVEGACIÓN DÍAS */
        .tabs { display: flex; overflow-x: auto; background: white; padding: 10px; gap: 8px; border-bottom: 1px solid #ddd; flex-shrink: 0; }
        .tab-btn { 
            padding: 12px 18px; border-radius: 20px; border: 1px solid var(--v); 
            background: white; color: var(--v); font-weight: bold; min-width: 85px; cursor: pointer; text-align: center;
        }
        .tab-btn.activo { background: var(--v) !important; color: white !important; }

        /* CONTENEDOR PRINCIPAL */
        .scroll-area { flex-grow: 1; overflow-y: auto; padding: 15px; padding-bottom: 110px; }
        .dia-content { display: none; }
        .dia-content.activo { display: block; }

        /* TARJETAS MOMENTOS */
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 18px; box-shadow: 0 3px 8px rgba(0,0,0,0.06); border: 1px solid #eee; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-left: 5px solid var(--v); padding-left: 10px; }
        .card-header b { color: var(--v); font-size: 0.9rem; letter-spacing: 0.5px; }

        /* BOTÓN AÑADIR (GRANDE PARA MÓVIL) */
        .btn-add { 
            background: var(--v); color: white; border: none; width: 35px; height: 35px; 
            border-radius: 50%; font-weight: bold; font-size: 22px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        /* FILAS DE ENTRADA */
        .fila { display: flex; gap: 8px; margin-top: 5px; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
        .in-txt { flex-grow: 1; background: #fff; }
        .in-pts { width: 60px; text-align: center; font-weight: bold; background: #f9f9f9; color: var(--v); }

        /* MODAL DESPENSA */
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 1000; }
        .modal-inner { background: white; width: 95%; height: 85vh; margin: 8vh auto; border-radius: 20px; overflow: hidden; position: relative; }
        .btn-x { position: absolute; top: 12px; right: 18px; font-size: 32px; font-weight: bold; color: #333; z-index: 1100; padding: 5px; }
        iframe { width: 100%; height: 100%; border: none; }

        /* BARRA INFERIOR DE PUNTOS */
        .barra { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px; border-top: 2px solid #eee; box-shadow: 0 -4px 10px rgba(0,0,0,0.05); }
        .box { text-align: center; }
        .box span { font-size: 11px; color: #888; display: block; margin-bottom: 3px; }
        .box input { width: 60px; border: none; font-size: 1.2rem; font-weight: bold; color: var(--n); text-align: center; padding: 0; background: transparent; }
        #res-p { font-size: 1.2rem; font-weight: bold; color: var(--n); }
    </style>
</head>
<body>

    <div class="header">PLANIFICADOR NUTRAFIT</div>

    <div class="tabs">
        <button class="tab-btn activo" onclick="ir('lun', this)">LUN</button>
        <button class="tab-btn" onclick="ir('mar', this)">MAR</button>
        <button class="tab-btn" onclick="ir('mie', this)">MIE</button>
        <button class="tab-btn" onclick="ir('jue', this)">JUE</button>
        <button class="tab-btn" onclick="ir('vie', this)">VIE</button>
        <button class="tab-btn" onclick="ir('sab', this)">SAB</button>
        <button class="tab-btn" onclick="ir('dom', this)">DOM</button>
    </div>

    <div class="scroll-area" id="contenedor">
        <div id="lun" class="dia-content activo"></div>
        <div id="mar" class="dia-content"></div>
        <div id="mie" class="dia-content"></div>
        <div id="jue" class="dia-content"></div>
        <div id="vie" class="dia-content"></div>
        <div id="sab" class="dia-content"></div>
        <div id="dom" class="dia-content"></div>
    </div>

    <div id="modal">
        <div class="modal-inner">
            <div class="btn-x" onclick="cerrar()">×</div>
            <iframe src="vistas/nuestra_despensa.html"></iframe>
        </div>
    </div>

    <div class="barra">
        <div class="box"><span>PRESUPUESTO</span><input type="number" id="p-total" value="30" oninput="calcular()"></div>
        <div class="box"><span>RESTANTE</span><div id="res-p">30</div></div>
    </div>

    <script>
        const momentos = ["DESAYUNO", "ALMUERZO", "COMIDA", "MERIENDA", "CENA"];
        const diasIds = ["lun", "mar", "mie", "jue", "vie", "sab", "dom"];

        // GENERACIÓN DE LOS 5 MOMENTOS PARA LOS 7 DÍAS
        function cargarEstructura() {
            diasIds.forEach(id => {
                const divDia = document.getElementById(id);
                let html = '';
                momentos.forEach(m => {
                    html += `
                        <div class="card">
                            <div class="card-header"><b>${m}</b><button class="btn-add" onclick="abrir()">+</button></div>
                            <div class="fila">
                                <input type="text" class="in-txt" placeholder="Añadir alimento...">
                                <input type="number" class="in-pts" value="0" oninput="calcular()">
                            </div>
                        </div>`;
                });
                divDia.innerHTML = html;
            });
        }

        function ir(id, btn) {
            // Ocultar todos
            const secciones = document.getElementsByClassName('dia-content');
            for(let s of secciones) { s.style.display = 'none'; s.classList.remove('activo'); }
            const btns = document.getElementsByClassName('tab-btn');
            for(let b of btns) { b.classList.remove('activo'); }
            
            // Mostrar seleccionado
            const elegido = document.getElementById(id);
            elegido.style.display = 'block';
            elegido.classList.add('activo');
            btn.classList.add('activo');
            calcular();
        }

        function abrir() { document.getElementById('modal').style.display = 'block'; }
        function cerrar() { document.getElementById('modal').style.display = 'none'; }

        function calcular() {
            const activo = document.querySelector('.dia-content.activo');
            if(!activo) return;
            const pts = activo.getElementsByClassName('in-pts');
            let suma = 0;
            for(let p of pts) { suma += parseFloat(p.value) || 0; }
            const pres = parseFloat(document.getElementById('p-total').value) || 0;
            const final = pres - suma;
            const resDiv = document.getElementById('res-p');
            resDiv.innerText = final;
            resDiv.style.color = final < 0 ? "red" : "#d35400";
        }

        // Ejecutar al cargar
        cargarEstructura();
    </script>
</body>
</html>

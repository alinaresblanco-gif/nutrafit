<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutraFit - Formulario Menú</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root { 
            --verde-corp: #78a978; 
            --verde-oscuro: #5a8a5a; 
            --gris-fondo: #f8f9fa; 
            --blanco: #ffffff;
        }

        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background-color: var(--gris-fondo); padding-top: 60px;
        }

        /* CABECERA ESTILO TUYO */
        .cabecera-fija { 
            background: var(--verde-corp); padding: 15px; 
            display: flex; justify-content: center; align-items: center; 
            color: white; position: fixed; top: 0; width: 100%; z-index: 1000;
            box-sizing: border-box;
        }

        /* EL ACORDEÓN QUE TE FUNCIONA */
        .contenedor-semana { padding: 15px; }

        .dia-ficha { 
            margin-bottom: 12px; border-radius: 12px; border: 1px solid #e0e0e0; 
            overflow: hidden; background: white;
        }

        .dia-header {
            background: var(--verde-corp); color: white; padding: 12px 15px;
            display: flex; align-items: center; justify-content: space-between; 
            cursor: pointer;
        }

        /* IMPORTANTE: Esto es lo que hace que funcione */
        .dia-cuerpo { 
            padding: 15px; 
            background: white; 
            display: none; /* Empieza oculto */
        }

        /* Cuando el padre tiene la clase 'activo', el cuerpo se muestra */
        .dia-ficha.activo .dia-cuerpo { 
            display: block !important; 
        }

        /* ESTILOS DE LOS PUNTOS */
        .input-puntos-dia, .input-restantes-dia { 
            width: 45px; border-radius: 5px; border: none; 
            text-align: center; font-weight: bold; outline: none;
        }
        .input-puntos-dia { color: var(--verde-oscuro); background: white; }
        .input-restantes-dia { color: #d35400; background: #fff; pointer-events: none; }

        /* ESTILOS DE LOS MOMENTOS */
        .momento-seccion { margin-bottom: 18px; }
        .momento-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .momento-titulo { 
            color: var(--verde-corp); font-weight: bold; font-size: 0.85rem; 
            text-transform: uppercase; border-left: 3px solid var(--verde-corp); padding-left: 8px; 
        }
        
        .fila-ingrediente { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f2f2f2; padding-bottom: 5px; margin-bottom: 5px; }
        .input-ingrediente { flex-grow: 1; border: none; outline: none; font-size: 0.95rem; color: #555; }
        .input-puntos-ing { width: 40px; border: none; background: #f7f7f7; text-align: center; font-weight: bold; border-radius: 4px; }
        .btn-add-momento { background: none; border: none; color: var(--verde-corp); cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>

    <header class="cabecera-fija">
        <span style="font-weight: bold; letter-spacing: 1px;">MI MENÚ SEMANAL</span>
    </header>

    <div class="contenedor-semana">
        <div class="dia-ficha" id="ficha-lunes">
            <div class="dia-header" onclick="toggleDia('ficha-lunes')">
                <strong>LUNES</strong>
                <div style="display: flex; gap: 10px;">
                    <div style="text-align: center;">
                        <span style="font-size: 0.5rem; display: block;">TOTAL</span>
                        <input type="number" class="input-puntos-dia" value="0" onclick="event.stopPropagation()">
                    </div>
                    <div style="text-align: center;">
                        <span style="font-size: 0.5rem; display: block;">RESTAN</span>
                        <input type="number" class="input-restantes-dia" value="0" readonly>
                    </div>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
            
            <div class="dia-cuerpo">
                <div class="momento-seccion">
                    <div class="momento-header">
                        <span class="momento-titulo">Desayuno</span>
                        <button class="btn-add-momento" onclick="alert('Abrir despensa')"><i class="fas fa-plus"></i></button>
                    </div>
                    <div class="fila-ingrediente">
                        <input type="text" class="input-ingrediente" placeholder="Añadir...">
                        <input type="number" class="input-puntos-ing" value="0">
                    </div>
                </div>

                <div class="momento-seccion">
                    <div class="momento-header"><span class="momento-titulo">Almuerzo</span><button class="btn-add-momento">+</button></div>
                    <div class="fila-ingrediente"><input type="text" class="input-ingrediente" placeholder="Añadir..."><input type="number" class="input-puntos-ing" value="0"></div>
                </div>

                <div class="momento-seccion">
                    <div class="momento-header"><span class="momento-titulo">Comida</span><button class="btn-add-momento">+</button></div>
                    <div class="fila-ingrediente"><input type="text" class="input-ingrediente" placeholder="Añadir..."><input type="number" class="input-puntos-ing" value="0"></div>
                </div>

                <div class="momento-seccion">
                    <div class="momento-header"><span class="momento-titulo">Merienda</span><button class="btn-add-momento">+</button></div>
                    <div class="fila-ingrediente"><input type="text" class="input-ingrediente" placeholder="Añadir..."><input type="number" class="input-puntos-ing" value="0"></div>
                </div>

                <div class="momento-seccion">
                    <div class="momento-header"><span class="momento-titulo">Cena</span><button class="btn-add-momento">+</button></div>
                    <div class="fila-ingrediente"><input type="text" class="input-ingrediente" placeholder="Añadir..."><input type="number" class="input-puntos-ing" value="0"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleDia(idFicha) {
            console.log("Intentando abrir: " + idFicha);
            const ficha = document.getElementById(idFicha);
            
            // Verificamos si ya está activo
            const estaActivo = ficha.classList.contains('activo');
            
            // Quitamos la clase a todos para que se cierren
            document.querySelectorAll('.dia-ficha').forEach(f => f.classList.remove('activo'));
            
            // Si no estaba activo, lo activamos
            if (!estaActivo) {
                ficha.classList.add('activo');
            }
        }
    </script>

</body>
</html>

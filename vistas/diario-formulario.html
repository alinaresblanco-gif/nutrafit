<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NutraFit - Planificador</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root {
            --verde-corp: #78a978;
            --verde-oscuro: #5a8a5a;
            --gris-fondo: #f4f7f4;
            --naranja: #d35400;
        }

        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background-color: var(--gris-fondo);
            display: flex; flex-direction: column; height: 100vh;
        }

        /* CABECERA */
        .header {
            background: var(--verde-corp); color: white;
            padding: 15px; text-align: center; font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* SELECTOR DE DÍAS (PESTAÑAS) */
        .tabs-dias {
            display: flex; overflow-x: auto; background: white;
            padding: 10px 5px; gap: 8px; border-bottom: 1px solid #ddd;
        }
        .tab-btn {
            padding: 8px 15px; border-radius: 20px; border: 1px solid var(--verde-corp);
            background: white; color: var(--verde-corp); white-space: nowrap;
            cursor: pointer; font-weight: bold; font-size: 0.8rem;
        }
        .tab-btn.active {
            background: var(--verde-corp); color: white;
        }

        /* CONTENEDOR DE CONTENIDO */
        .contenido-dia {
            flex-grow: 1; overflow-y: auto; padding: 15px;
            display: none; /* Se mostrará con JS */
        }
        .contenido-dia.active { display: block; }

        /* TARJETAS DE MOMENTOS */
        .card-momento {
            background: white; border-radius: 12px; padding: 15px;
            margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .momento-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 10px;
        }
        .momento-titulo { color: var(--verde-corp); font-weight: bold; text-transform: uppercase; }

        /* FILAS DE INGREDIENTES */
        .fila-ingrediente {
            display: flex; gap: 10px; margin-bottom: 8px; align-items: center;
        }
        .input-txt { flex-grow: 1; border: 1px solid #eee; padding: 8px; border-radius: 5px; outline: none; }
        .input-pts { width: 45px; border: 1px solid #eee; padding: 8px; border-radius: 5px; text-align: center; font-weight: bold; background: #f9f9f9; }

        .btn-add { background: var(--verde-corp); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; }

        /* BARRA INFERIOR DE PUNTOS */
        .resumen-puntos {
            background: white; padding: 15px; border-top: 1px solid #ddd;
            display: flex; justify-content: space-around; font-weight: bold;
        }
        .pts-box { text-align: center; }
        .pts-label { font-size: 0.6rem; display: block; color: #888; }
        .pts-val { font-size: 1.1rem; color: var(--naranja); }
    </style>
</head>
<body>

    <div class="header">PLANIFICADOR SEMANAL</div>

    <div class="tabs-dias">
        <button class="tab-btn active" onclick="cambiarDia('lunes', this)">LUN</button>
        <button class="tab-btn" onclick="cambiarDia('martes', this)">MAR</button>
        <button class="tab-btn" onclick="cambiarDia('miercoles', this)">MIE</button>
        <button class="tab-btn" onclick="cambiarDia('jueves', this)">JUE</button>
        <button class="tab-btn" onclick="cambiarDia('viernes', this)">VIE</button>
        <button class="tab-btn" onclick="cambiarDia('sabado', this)">SAB</button>
        <button class="tab-btn" onclick="cambiarDia('domingo', this)">DOM</button>
    </div>

    <div id="lunes" class="contenido-dia active">
        <div class="card-momento">
            <div class="momento-header">
                <span class="momento-titulo">Desayuno</span>
                <button class="btn-add">+</button>
            </div>
            <div class="fila-ingrediente">
                <input type="text" class="input-txt" placeholder="Ingrediente...">
                <input type="number" class="input-pts" value="0">
            </div>
        </div>

        <div class="card-momento">
            <div class="momento-header">
                <span class="momento-titulo">Comida</span>
                <button class="btn-add">+</button>
            </div>
            <div class="fila-ingrediente">
                <input type="text" class="input-txt" placeholder="Ingrediente...">
                <input type="number" class="input-pts" value="0">
            </div>
        </div>
        </div>

    <div id="martes" class="contenido-dia">
        <div class="card-momento">
            <div class="momento-header"><span class="momento-titulo">Desayuno</span><button class="btn-add">+</button></div>
            <div class="fila-ingrediente">
                <input type="text" class="input-txt" placeholder="Ingrediente...">
                <input type="number" class="input-pts" value="0">
            </div>
        </div>
    </div>

    <div class="resumen-puntos">
        <div class="pts-box">
            <span class="pts-label">PRESUPUESTO</span>
            <input type="number" id="total-dia" value="30" style="width: 50px; border: none; font-size: 1.1rem; text-align: center; font-weight: bold;">
        </div>
        <div class="pts-box">
            <span class="pts-label">RESTANTES</span>
            <span class="pts-val" id="restantes-val">30</span>
        </div>
    </div>

    <script>
        function cambiarDia(diaId, btn) {
            // Ocultar todos los contenidos
            document.querySelectorAll('.contenido-dia').forEach(c => c.classList.remove('active'));
            // Desactivar todos los botones
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            // Mostrar el seleccionado
            document.getElementById(diaId).classList.add('active');
            btn.classList.add('active');
        }

        // Aquí iría el resto de la lógica de sumar puntos, igual que antes
    </script>
</body>
</html>

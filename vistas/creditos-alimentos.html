<div class="vista-cabecera-fija">
    <div class="cabecera-barra">
        <button onclick="volverInicio()" class="boton-volver">
            <i class="fas fa-chevron-left"></i>
        </button>
        <span class="titulo-vista">
            <i class="fas fa-apple-alt"></i> CREDITOS DE MIS ALIMENTOS
        </span>
    </div>
</div>

<div class="contenido-scroll" style="margin-top: 70px; padding: 15px;">

    <button class="boton-historial-v2" onclick="abrirVista('nuestra_despensa')" style="margin-bottom: 20px;">
        <i class="fas fa-warehouse"></i> NUESTRA DESPENSA
    </button>

    <div class="formulario-card">

        <div class="campo-grupo-centrado">
            <label class="etiqueta-verde">NOMBRE</label>
            <input type="text" id="alim-nombre" placeholder="Ej: Pechuga de Pollo" class="input-texto-centrado">
        </div>

        <div class="campo-grupo-centrado">
            <label class="etiqueta-verde">GRUPO</label>
            <select id="alim-grupo" class="input-texto-centrado select-corporativo">
                <option value="🍉 FRUTA">🍉 FRUTA</option>
                <option value="🥦 HORTALIZAS,VERDURAS Y PATATAS">🥦 HORTALIZAS, VERDURAS Y PATATAS</option>
                <option value="🌾 CEREALES">🌾 CEREALES</option>
                <option value="🥖 PAN">🥖 PAN</option>
                <option value="🥘 PASTAS, ARROZ Y LEGUMBRES">🥘 PASTAS, ARROZ Y LEGUMBRES</option>
                <option value="🥩 CARNES Y AVES">🥩 CARNES Y AVES</option>
                <option value="🐟 PESCADOS">🐟 PESCADOS</option>
                <option value="🥚 HUEVOS">🥚 HUEVOS</option>
                <option value="🧀 EMBUTIDOS">🧀 EMBUTIDOS</option>
                <option value="🏺 MATERIAS GRASAS">🏺 MATERIAS GRASAS</option>
                <option value="🥜 FRUTOS SECOS">🥜 FRUTOS SECOS</option>
                <option value="🍶 LACTEOS">🍶 LACTEOS</option>
                <option value="🥧 POSTRES">🥧 POSTRES</option>
                <option value="🍯 UNTABLES">🍯 UNTABLES</option>
                <option value="🧃 SALSAS">🧃 SALSAS</option>
                <option value="🍟 APERITIVOS SALADOS">🍟 APERITIVOS SALADOS</option>
                <option value="🥐 BOLLERIA">🥐 BOLLERIA</option>
                <option value="🍰 PASTELERIA">🍰 PASTELERIA</option>
                <option value="🍨 HELADOS">🍨 HELADOS</option>
                <option value="🍵 BEBIDAS">🍵 BEBIDAS</option>
                <option value="🧂 CONDIMENTOS">🧂 CONDIMENTOS</option>
            </select>
        </div>

        <div class="grid-macros">
            <div class="campo-macro-tactil">
                <label class="etiqueta-verde-centrada">PROTEINAS</label>
                <div class="control-stepper-corporativo">
                    <button onclick="ajustarMacroAlimento('alim-prot', -0.1)" class="btn-stepper">-</button>
                    <input type="number" id="alim-prot" value="0.00" step="0.01" class="input-macro-centro" oninput="recalcularAlimento()">
                    <button onclick="ajustarMacroAlimento('alim-prot', 0.1)" class="btn-stepper">+</button>
                </div>
            </div>
            <div class="campo-macro-tactil">
                <label class="etiqueta-verde-centrada">CARBOHIDRATOS</label>
                <div class="control-stepper-corporativo">
                    <button onclick="ajustarMacroAlimento('alim-carb', -0.1)" class="btn-stepper">-</button>
                    <input type="number" id="alim-carb" value="0.00" step="0.01" class="input-macro-centro" oninput="recalcularAlimento()">
                    <button onclick="ajustarMacroAlimento('alim-carb', 0.1)" class="btn-stepper">+</button>
                </div>
            </div>
            <div class="campo-macro-tactil">
                <label class="etiqueta-verde-centrada">GRASAS</label>
                <div class="control-stepper-corporativo">
                    <button onclick="ajustarMacroAlimento('alim-gras', -0.1)" class="btn-stepper">-</button>
                    <input type="number" id="alim-gras" value="0.00" step="0.01" class="input-macro-centro" oninput="recalcularAlimento()">
                    <button onclick="ajustarMacroAlimento('alim-gras', 0.1)" class="btn-stepper">+</button>
                </div>
            </div>
            <div class="campo-macro-tactil">
                <label class="etiqueta-verde-centrada">FIBRA</label>
                <div class="control-stepper-corporativo">
                    <button onclick="ajustarMacroAlimento('alim-fibra', -0.1)" class="btn-stepper">-</button>
                    <input type="number" id="alim-fibra" value="0.00" step="0.01" class="input-macro-centro" oninput="recalcularAlimento()">
                    <button onclick="ajustarMacroAlimento('alim-fibra', 0.1)" class="btn-stepper">+</button>
                </div>
            </div>
        </div>

        <div class="campo-grupo-centrado" style="margin-top: 20px;">
            <label class="etiqueta-verde">CRÉDITOS MANUALES</label>
            <input type="number" id="alim-manual" class="input-texto-centrado" placeholder="0" oninput="gestionarInputsCreditos('manual')">
        </div>

        <div class="campo-grupo-centrado">
            <label class="etiqueta-verde">CRÉDITOS CALCULADOS</label>
            <input type="text" id="alim-calc" class="input-texto-centrado readonly-input" readonly value="0">
        </div>

        <div class="botones-fila-vertical">
            <button class="boton-accion-v2" onclick="guardarEnDespensa()">
                <i class="fas fa-save"></i> GUARDAR EN DESPENSA
            </button>
            <button class="boton-accion-v2 boton-secundario-corporativo" onclick="limpiarFormAlimento()">
                <i class="fas fa-plus-circle"></i> NUEVO ALIMENTO
            </button>
        </div>

    </div>
</div>

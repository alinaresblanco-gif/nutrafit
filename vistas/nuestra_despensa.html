<div class="vista-cabecera-fija" style="height: 120px; position: sticky; top: 0; z-index: 100;"> 
    <div class="cabecera-barra">
        <button onclick="abrirVista('creditos-alimentos')" class="boton-nav-circular">
            <i class="fas fa-chevron-left"></i>
        </button>
        
        <span class="titulo-vista">
            <i class="fas fa-warehouse"></i> NUESTRA DESPENSA
        </span>

        <button onclick="volverInicio()" class="boton-nav-circular">
            <i class="fas fa-th-large"></i>
        </button>
    </div>

    <div class="contenedor-buscador-corporativo">
        <div class="caja-busqueda-v2">
            <i class="fas fa-search"></i>
            <input type="text" id="buscador-despensa" placeholder="Buscar alimento..." onkeyup="filtrarDespensa()">
        </div>
    </div>
</div>

<div class="contenido-scroll" style="margin-top: 10px; padding: 10px;">
    <div id="lista-alimentos-agrupados">
        <div class="cargando-container">
            <div class="spinner-verde"></div>
            <p>Conectando con el almacén...</p>
        </div>
    </div>
</div>

<style>
    .vista-cabecera-fija { background: #78a978; }
    .cabecera-barra {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 15px;
        color: white;
    }
    .boton-nav-circular {
        background: rgba(255, 255, 255, 0.2);
        border: none; color: white; width: 38px; height: 38px;
        border-radius: 50%; display: flex; align-items: center; justify-content: center;
        cursor: pointer;
    }
    .titulo-vista { font-weight: bold; font-size: 16px; }
    .contenedor-buscador-corporativo { padding: 0 15px 15px 15px; background: #78a978; }
    .caja-busqueda-v2 {
        background: white; border-radius: 25px; display: flex;
        align-items: center; padding: 8px 15px;
    }
    .caja-busqueda-v2 i { color: #78a978; margin-right: 10px; }
    .caja-busqueda-v2 input { border: none; outline: none; width: 100%; font-size: 16px; }

    /* Estilo de la lista */
    .cabecera-grupo-despensa {
        background: #f1f8f1; color: #4a6d4a; padding: 10px 15px;
        font-weight: bold; border-left: 5px solid #78a978; margin: 15px 0 5px 0;
    }
    .tabla-despensa { width: 100%; border-collapse: collapse; background: white; margin-bottom: 10px; }
    .fila-alimento { border-bottom: 1px solid #f5f5f5; cursor: pointer; }
    .fila-alimento td { padding: 12px 15px; }
    .credito-badge {
        background: #78a978; color: white; padding: 4px 12px;
        border-radius: 15px; font-weight: bold; font-size: 0.85em;
    }

    /* Spinner */
    .cargando-container { text-align: center; padding: 50px 20px; color: #78a978; }
    .spinner-verde {
        width: 30px; height: 30px; border: 4px solid #f3f3f3;
        border-top: 4px solid #78a978; border-radius: 50%;
        animation: spin 1s linear infinite; margin: 0 auto 10px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>

<script>
    let datosLocales = []; // Aquí guardaremos los alimentos una vez descargados

    // Se ejecuta al abrir la página
    document.addEventListener('DOMContentLoaded', function() {
        ejecutarCarga();
    });

    function ejecutarCarga() {
        // Llamada limpia al servidor sin inyecciones raras
        google.script.run
            .withSuccessHandler(function(datos) {
                datosLocales = datos;
                renderizar(datos);
            })
            .withFailureHandler(function(err) {
                document.getElementById('lista-alimentos-agrupados').innerHTML = "Error al cargar datos.";
            })
            .obtenerAlimentosDespensa();
    }

    function renderizar(datos) {
        const contenedor = document.getElementById('lista-alimentos-agrupados');
        if (!datos || datos.length === 0) {
            contenedor.innerHTML = "No hay alimentos en el Excel.";
            return;
        }

        let html = "";
        // Agrupar por Categoría/Grupo
        const grupos = {};
        datos.forEach(a => {
            const g = a.Categoria || "GENERAL";
            if (!grupos[g]) grupos[g] = [];
            grupos[g].push(a);
        });

        for (let g in grupos) {
            html += `<div class="cabecera-grupo-despensa">${g}</div>`;
            html += `<table class="tabla-despensa">`;
            grupos[g].forEach(a => {
                // Escapamos el nombre por si tiene comillas
                const nombreSeguro = a.Nombre.replace(/'/g, "\\'");
                html += `
                    <tr class="fila-alimento" onclick="enviarAlimento('${nombreSeguro}', ${a.Netos})">
                        <td>${a.Nombre}</td>
                        <td style="text-align:right"><span class="credito-badge">${a.Netos} pts</span></td>
                    </tr>`;
            });
            html += `</table>`;
        }
        contenedor.innerHTML = html;
    }

    function filtrarDespensa() {
        const buscar = document.getElementById('buscador-despensa').value.toLowerCase();
        const filtrados = datosLocales.filter(a => 
            a.Nombre.toLowerCase().includes(buscar) || 
            (a.Categoria && a.Categoria.toLowerCase().includes(buscar))
        );
        renderizar(filtrados);
    }

    function enviarAlimento(nombre, pts) {
        window.parent.postMessage({
            tipo: "ALIMENTO_SELECCIONADO",
            Nombre: nombre,
            Netos: pts
        }, "*");
    }

    function abrirVista(v) { google.script.run.withSuccessHandler(url => window.location.href = url).abrirVista(v); }
    function volverInicio() { google.script.run.withSuccessHandler(url => window.location.href = url).abrirVista('inicio'); }
</script>

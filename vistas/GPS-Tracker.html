<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NutraFit - GPS Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: #f4f4f4; }
        .cabecera-barra { background: #78a978; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; color: white; position: sticky; top: 0; z-index: 1000; }
        .boton-nav-circular { background: rgba(255,255,255,0.2); border:none; color:white; width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size: 18px; }
        #mapa-gps { width: 100%; height: 250px; background: #eee; border-bottom: 4px solid #78a978; }
        .contenedor-controles { padding: 15px; background: #78a978; border-radius: 0 0 30px 30px; }
        .pantalla-cronometro { background: #1a1a1a; color: #78a978; text-align: center; padding: 15px; border-radius: 15px; font-family: 'Courier New', monospace; font-size: 40px; font-weight: bold; margin-bottom: 15px; border: 2px solid #5a8a5a; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .btn-gps { border: 2px solid white; border-radius: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; color: white; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-inicio { background: #28a745; padding: 15px; font-size: 18px; }
        .btn-pausa { background: #ffc107; flex: 1; padding: 12px; color: #333; border-color: #333; }
        .btn-reinicio { background: #6c757d; flex: 1; padding: 12px; }
        .btn-parar { background: #dc3545; padding: 15px; font-size: 18px; margin-top: 10px; }
        .fila-botones { display: flex; gap: 10px; margin-top: 10px; }
        .grid-datos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .dato-card { background: white; padding: 10px; border-radius: 12px; text-align: center; }
        .dato-card label { display: block; color: #78a978; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .dato-card span { font-size: 18px; font-weight: bold; color: #333; }
        .btn-guardar-final { background: white; color: #78a978; width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

    <div class="cabecera-barra">
        <button onclick="window.history.back()" class="boton-nav-circular"><i class="fas fa-chevron-left"></i></button>
        <strong>GRABAR MI RUTA</strong>
        <button onclick="location.reload()" class="boton-nav-circular"><i class="fas fa-redo-alt"></i></button>
    </div>

    <div id="mapa-gps"></div>

    <div class="contenedor-controles">
        <div class="pantalla-cronometro" id="display-tiempo">00:00:00</div>

        <button class="btn-gps btn-inicio" id="btn-start" onclick="toggleSeguimiento()">
            <i class="fas fa-play"></i> INICIAR MARCHA
        </button>

        <div class="fila-botones">
            <button class="btn-gps btn-pausa" onclick="pausarSeguimiento()"><i class="fas fa-pause"></i> PAUSAR</button>
            <button class="btn-gps btn-reinicio" onclick="reiniciarSeguimiento()"><i class="fas fa-undo"></i> RESET</button>
        </div>

        <button class="btn-gps btn-parar" onclick="finalizarRuta()"><i class="fas fa-stop"></i> TERMINAR RUTA</button>

        <div class="grid-datos">
            <div class="dato-card"><label>Distancia</label><span id="stat-dist">0.00 KM</span></div>
            <div class="dato-card"><label>Vel. Media</label><span id="stat-vel">0.0 KM/H</span></div>
            <div class="dato-card"><label>Pasos</label><span id="stat-pasos">0</span></div>
            <div class="dato-card"><label>Desnivel</label><span id="stat-desnivel">0 M</span></div>
        </div>

        <button class="btn-guardar-final" onclick="guardarEnHistorial()">
            <i class="fas fa-cloud-upload-alt"></i> VOLVER Y CARGAR DATOS
        </button>
    </div>

    <script>
        let map, marker, routeLine, watchID;
        let pathCoordinadas = [];
        let totalMetros = 0, estaCorriendo = false, tiempoInicio, intervaloTiempo, tiempoTranscurrido = 0;
        let altitudAnterior = null, desnivelAcumulado = 0;

        function initMap() {
            map = L.map('mapa-gps').setView([40.41, -3.70], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            routeLine = L.polyline([], {color: '#2196F3', weight: 6}).addTo(map);
            marker = L.circleMarker([0,0], {radius: 7, color: 'white', fillColor: '#2196F3', fillOpacity: 1}).addTo(map);
            
            navigator.geolocation.getCurrentPosition(pos => {
                const latlng = [pos.coords.latitude, pos.coords.longitude];
                map.setView(latlng, 17);
                marker.setLatLng(latlng);
            });
        }

        function actualizarReloj() {
            let diferencia = Date.now() - tiempoInicio + tiempoTranscurrido;
            let hh = Math.floor(diferencia / 3600000);
            let mm = Math.floor((diferencia % 3600000) / 60000);
            let ss = Math.floor((diferencia % 60000) / 1000);
            document.getElementById('display-tiempo').innerText = `${hh.toString().padStart(2,'0')}:${mm.toString().padStart(2,'0')}:${ss.toString().padStart(2,'0')}`;
        }

        function toggleSeguimiento() {
            if (!estaCorriendo) {
                estaCorriendo = true;
                tiempoInicio = Date.now();
                intervaloTiempo = setInterval(actualizarReloj, 1000);
                document.getElementById('btn-start').innerHTML = '<i class="fas fa-running"></i> GRABANDO...';
                watchID = navigator.geolocation.watchPosition(pos => {
                    const lat = pos.coords.latitude, lon = pos.coords.longitude, alt = pos.coords.altitude;
                    const punto = [lat, lon];
                    if (pathCoordinadas.length > 0) {
                        const d = map.distance(pathCoordinadas[pathCoordinadas.length-1], punto);
                        if (d > 3) {
                            totalMetros += d;
                            if (alt !== null && altitudAnterior !== null && alt > altitudAnterior) desnivelAcumulado += (alt - altitudAnterior);
                            actualizarStats();
                        }
                    }
                    altitudAnterior = alt;
                    pathCoordinadas.push(punto);
                    routeLine.setLatLngs(pathCoordinadas);
                    marker.setLatLng(punto);
                    map.panTo(punto);
                }, null, { enableHighAccuracy: true });
            }
        }

        function actualizarStats() {
            const km = (totalMetros / 1000).toFixed(2);
            document.getElementById('stat-dist').innerText = km + " KM";
            document.getElementById('stat-pasos').innerText = Math.round(totalMetros / 0.72);
            document.getElementById('stat-desnivel').innerText = Math.round(desnivelAcumulado) + " M";
        }

        function pausarSeguimiento() {
            if (estaCorriendo) {
                estaCorriendo = false;
                clearInterval(intervaloTiempo);
                tiempoTranscurrido += Date.now() - tiempoInicio;
                navigator.geolocation.clearWatch(watchID);
                document.getElementById('btn-start').innerHTML = '<i class="fas fa-play"></i> REANUDAR';
            }
        }

        function finalizarRuta() { pausarSeguimiento(); alert("Ruta finalizada."); }

        function guardarEnHistorial() {
            const distFinal = (totalMetros / 1000).toFixed(2);
            const minutosFinal = Math.round((tiempoTranscurrido + (estaCorriendo ? Date.now()-tiempoInicio : 0)) / 60000);
            
            localStorage.setItem('gps_distancia', distFinal);
            localStorage.setItem('gps_tiempo', minutosFinal);
            localStorage.setItem('gps_pasos', Math.round(totalMetros / 0.72));
            localStorage.setItem('gps_desnivel', Math.round(desnivelAcumulado));

            window.location.href = "ejercicio-diario.html"; 
        }

        window.onload = initMap;
    </script>
</body>
</html>

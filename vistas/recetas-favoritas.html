<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutraFit - Mi Libro de Recetas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        :root { --verde-corp: #78a978; --verde-oscuro: #5a8a5a; --gris-fondo: #f4f4f4; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--gris-fondo); color: #333; }

        /* CABECERA */
        .cabecera-barra { 
            background: var(--verde-corp); 
            padding: 10px 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            color: white; position: sticky; top: 0; z-index: 1000;
        }
        .boton-nav-circular { 
            background: rgba(255,255,255,0.2); border:none; color:white; 
            width:38px; height:38px; border-radius:50%; 
            display:flex; align-items:center; justify-content:center;
            font-size: 18px; cursor: pointer;
        }

        .contenedor-principal { padding: 15px; }
        .grid-recetas { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        /* TARJETA VISUAL (RESTAURADA) */
        .tarjeta-receta {
            background: white; border-radius: 15px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .tarjeta-receta img { width: 100%; height: 120px; object-fit: cover; }
        .info-tarjeta { padding: 10px; text-align: center; }
        .info-tarjeta h3 { margin: 0 0 10px; font-size: 0.9rem; color: #444; height: 40px; overflow: hidden; }
        
        .btn-ver-receta {
            background: var(--verde-corp); color: white; border: none;
            padding: 8px 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer;
        }

        /* BOTÓN + */
        .btn-flotante {
            position: fixed; bottom: 30px; right: 25px;
            background: var(--verde-corp); color: white;
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: none; z-index: 999; cursor: pointer;
        }

        /* MODALES Y SECCIONES */
        #seccion-formulario, #modal-detalle-receta { display: none; }
        
        .modal-detalle {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 2000; overflow-y: auto;
        }
        .img-detalle-full { width: 100%; height: 250px; object-fit: cover; }
        .contenido-detalle { padding: 20px; position: relative; top: -30px; background: white; border-radius: 30px 30px 0 0; }
        
        /* ESTILO FORMULARIO */
        .campo-grupo { margin-bottom: 15px; }
        .campo-grupo label { display: block; color: var(--verde-corp); font-weight: bold; margin-bottom: 5px; }
        .campo-grupo input, .campo-grupo textarea {
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="cabecera-barra">
        <button onclick="window.location.href='../index.html'" class="boton-nav-circular">
            <i class="fas fa-chevron-left"></i>
        </button>
        <strong>MI LIBRO DE RECETAS</strong>
        <div style="width:38px;"></div> 
    </div>

    <div id="seccion-explorar" class="contenedor-principal">
        <div id="contenedor-cards" class="grid-recetas">
            <div class="tarjeta-receta">
                <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c" alt="Receta">
                <div class="info-tarjeta">
                    <h3>Ensalada NutraFit</h3>
                    <button class="btn-ver-receta" onclick="abrirDetalleDemo()">VER RECETA</button>
                </div>
            </div>
        </div>

        <button class="btn-flotante" onclick="abrirFormularioReceta()">
            <i class="fas fa-plus"></i>
        </button>
    </div>

    <div id="seccion-formulario" class="contenedor-principal" style="background: white; min-height: 100vh;">
        <h2 style="color: var(--verde-corp);">Nueva Receta</h2>
        <div class="campo-grupo">
            <label>Nombre</label>
            <input type="text" id="form-nombre">
        </div>
        <div class="campo-grupo">
            <label>Ingredientes</label>
            <textarea id="form-ingredientes" rows="5"></textarea>
        </div>
        <button onclick="guardarNuevaReceta()" style="background: var(--verde-corp); color: white; padding: 15px; width: 100%; border-radius: 10px; border: none; font-weight: bold;">
            GUARDAR RECETA
        </button>
        <button onclick="cerrarTodo()" style="width: 100%; margin-top: 10px; border: none; background: none; color: #666;">
            Cancelar
        </button>
    </div>

    <div id="modal-detalle-receta" class="modal-detalle">
        <button onclick="cerrarTodo()" style="position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0,0,0,0.5); color: white; border: none; width: 40px; height: 40px; border-radius: 50%;">X</button>
        <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c" class="img-detalle-full">
        <div class="contenido-detalle">
            <h2 id="det-nombre">Ensalada NutraFit</h2>
            <p><strong>Ingredientes:</strong></p>
            <p>Lechuga, tomate, aguacate, pollo a la plancha y aderezo ligero.</p>
            <p><strong>Elaboración:</strong></p>
            <p>Mezclar todos los ingredientes frescos en un bol y añadir la proteína al final.</p>
        </div>
    </div>

    <script>
        // Lógica de navegación INFALIBLE dentro del HTML
        function abrirFormularioReceta() {
            document.getElementById('seccion-explorar').style.display = 'none';
            document.getElementById('seccion-formulario').style.display = 'block';
        }

        function abrirDetalleDemo() {
            document.getElementById('modal-detalle-receta').style.display = 'block';
        }

        function cerrarTodo() {
            document.getElementById('seccion-formulario').style.display = 'none';
            document.getElementById('modal-detalle-receta').style.display = 'none';
            document.getElementById('seccion-explorar').style.display = 'block';
        }
    </script>

    <script src="../js/config.js"></script>
    <script src="../js/recetas.js"></script>
</body>
</html>

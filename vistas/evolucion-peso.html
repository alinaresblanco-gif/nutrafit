<div class="contenedor-vista">
    <header class="cabecera-seccion">
        <button onclick="volverInicio()" class="boton-volver"><i class="fas fa-chevron-left"></i></button>
        <div class="titulo-cabecera" style="display: flex; align-items: center; gap: 10px;">
            <i class="fas fa-weight"></i>
            <h1>EVOLUCIÓN DE PESO</h1>
        </div>
    </header>

    <main class="contenido-seccion">
        
        <div class="tarjeta-progreso" style="padding: 15px; min-height: 200px;">
            <canvas id="graficoPeso"></canvas>
        </div>

        <div id="contenedor-imc" style="background: white; margin: 15px 0; padding: 15px; border-radius: 15px; border: 2px solid #78a978; text-align: center; display: none;">
            <p style="margin: 0; color: #666; font-size: 0.9rem; font-weight: bold;">TU IMC ACTUAL</p>
            <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 5px;">
                <span id="valor-imc" style="font-size: 2rem; font-weight: bold; color: #78a978;">--</span>
                <span id="estado-imc" style="padding: 5px 12px; border-radius: 20px; color: white; font-weight: bold; font-size: 0.8rem; background: #ccc;">Cargando...</span>
            </div>
        </div>

        <div id="mensaje-motivador" style="text-align: center; margin: 15px 0; font-weight: bold; padding: 12px; border-radius: 10px; border: 1px dashed #78a978; color: #78a978;">
            Registra tu peso para ver tu progreso
        </div>

        <div class="tarjeta-progreso">
            <div style="margin-bottom: 20px; text-align: left;">
                <label style="color: #78a978; font-weight: bold; display: block; margin-bottom: 8px;">FECHA</label>
                <input type="date" id="fecha-peso" style="width: 100%; padding: 12px; border: 1px solid #d0e1d0; border-radius: 8px; font-size: 1rem;">
            </div>

            <div style="margin-bottom: 25px; text-align: center;">
                <label style="color: #78a978; font-weight: bold; display: block; margin-bottom: 12px; text-align: left;">PESO ACTUAL (kg)</label>
                
                <div style="display: flex; align-items: center; justify-content: center; gap: 15px;">
                    <button type="button" onclick="ajustarPeso(-0.1)" 
                        style="width: 55px; height: 55px; border-radius: 12px; border: none; background-color: #78a978; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                        <i class="fas fa-minus"></i>
                    </button>

                    <input type="number" id="input-peso" value="75.0" step="0.1" 
                        style="width: 100px; height: 55px; text-align: center; font-size: 1.5rem; font-weight: bold; border: 2px solid #78a978; border-radius: 12px; color: #333; outline: none;">

                    <button type="button" onclick="ajustarPeso(0.1)" 
                        style="width: 55px; height: 55px; border-radius: 12px; border: none; background-color: #78a978; color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            </div>

            <button id="btn-guardar-peso" onclick="guardarPeso()" class="boton-reset" style="background-color: #78a978; box-shadow: 0 4px 12px rgba(120, 169, 120, 0.3); width: 100%;">
                <i class="fas fa-save"></i> GUARDAR EN HISTORIAL
            </button>
        </div>

        <div class="seccion-historico">
            <h3 style="color: #78a978;"><i class="fas fa-history"></i> HISTORIAL</h3>
            <table class="tabla-nutrafit">
                <thead>
                    <tr>
                        <th>FECHA</th>
                        <th>PESO</th>
                        <th>DIF.</th>
                    </tr>
                </thead>
                <tbody id="tabla-peso-body">
                </tbody>
            </table>
        </div>
    </main>
</div>
